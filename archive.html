<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHZ Lednica - Archív</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root{
            --bg:#05070b;
            --panel:#0f141b;
            --panel-2:#151c24;
            --line:#212a35;
            --text:#f6f9fc;
            --muted:#98a6b6;
            --green:#00e676;
            --red:#ff1744;
            --yellow:#ffeb3b;
            --cyan:#38cfff;
            --archive-header-control-width: 172px;
            --archive-header-control-height: 46px;
        }

        *{ box-sizing:border-box; }

        body{
            margin:0;
            min-height:100vh;
            background:
                radial-gradient(circle at top right, rgba(56,207,255,0.08), transparent 28%),
                radial-gradient(circle at top left, rgba(255,23,68,0.08), transparent 24%),
                var(--bg);
            color:var(--text);
            font-family:Segoe UI,sans-serif;
        }

        .header{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:16px;
            padding:14px 20px;
            border-bottom:1px solid var(--line);
            background:rgba(0,0,0,0.72);
            backdrop-filter:blur(12px);
            position:sticky;
            top:0;
            z-index:50;
        }

        .brand{
            display:flex;
            align-items:center;
            gap:12px;
            min-width:0;
        }

        .brand img{
            width:auto;
            height:46px;
        }

        .brand-copy{
            display:flex;
            flex-direction:column;
            gap:2px;
            min-width:0;
        }

        .brand-copy strong{
            font-size:1.25rem;
            letter-spacing:0.04em;
        }

        .brand-copy span{
            color:var(--muted);
            font-size:0.92rem;
        }

        .header-right{
            display:flex;
            align-items:center;
            gap:12px;
            flex-wrap:wrap;
            justify-content:flex-end;
        }

        .mode-pill{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:var(--archive-header-control-width);
            height:var(--archive-header-control-height);
            padding:4px 10px;
            border-radius:12px;
            font-size:0.82rem;
            font-weight:900;
            letter-spacing:0.08em;
            text-transform:uppercase;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.08);
            color:#dce8f4;
        }

        .clock{
            font-family:monospace;
            font-size:1.25rem;
            font-weight:800;
            color:var(--yellow);
        }

        .mobile-timer-card{
            width:var(--archive-header-control-width);
            height:var(--archive-header-control-height);
            padding:3px 6px;
            border-radius:12px;
            background:linear-gradient(180deg, rgba(21,28,36,0.96), rgba(10,14,19,0.96));
            border:1px solid #212a35;
            box-shadow:0 16px 40px rgba(0,0,0,0.25);
            text-align:center;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .mobile-timer-label{
            color:#9eacba;
            font-size:0.78rem;
            font-weight:800;
            letter-spacing:0.08em;
            text-transform:uppercase;
        }

        .mobile-card-clock{
            margin-top:2px;
            font-family:monospace;
            font-size:1.26rem;
            font-weight:800;
            line-height:1;
            color:#fff;
        }

        .btn-link{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            width:var(--archive-header-control-width);
            min-height:var(--archive-header-control-height);
            height:var(--archive-header-control-height);
            padding:4px 10px;
            border-radius:12px;
            text-decoration:none;
            color:#fff;
            font-weight:900;
            text-align:center;
            background:linear-gradient(180deg, #223040, #16202b);
            border:1px solid rgba(255,255,255,0.08);
            cursor:pointer;
            line-height:1.05;
        }

        button.btn-link{
            font-family:inherit;
            font-size:1rem;
        }

        .btn-link-danger{
            background:linear-gradient(180deg, #ff4166, #d60d37);
            border-color:rgba(255,255,255,0.1);
        }

        .page{
            padding:18px;
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        .summary-grid{
            display:grid;
            grid-template-columns:repeat(3, minmax(0, 1fr));
            gap:14px;
        }

        .summary-card{
            background:linear-gradient(180deg, rgba(21,28,36,0.96), rgba(10,14,19,0.96));
            border:1px solid var(--line);
            border-radius:18px;
            padding:18px;
            box-shadow:0 16px 40px rgba(0,0,0,0.25);
        }

        .summary-label{
            color:var(--muted);
            font-size:0.85rem;
            font-weight:800;
            letter-spacing:0.08em;
            text-transform:uppercase;
        }

        .summary-value{
            margin-top:8px;
            font-size:2rem;
            font-weight:900;
            line-height:1.05;
        }

        .summary-note{
            margin-top:10px;
            color:#d2dae4;
            font-size:0.96rem;
            line-height:1.45;
        }

        .view{
            display:none;
        }

        .cards-tv{
            display:grid;
            grid-template-columns:repeat(2, minmax(0, 1fr));
            gap:16px;
        }

        .cards-mobile{
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        .archive-card{
            background:linear-gradient(180deg, rgba(18,24,31,0.98), rgba(10,14,18,0.98));
            border:1px solid var(--line);
            border-radius:20px;
            padding:18px;
            display:flex;
            flex-direction:column;
            gap:14px;
            box-shadow:0 18px 48px rgba(0,0,0,0.28);
        }

        .archive-card.mobile{
            padding:16px;
            border-radius:18px;
        }

        .archive-card-top{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:12px;
        }

        .category-badge{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:7px 12px;
            border-radius:999px;
            font-size:0.8rem;
            font-weight:900;
            letter-spacing:0.08em;
            text-transform:uppercase;
            color:#061018;
            background:var(--yellow);
        }

        .category-badge.aed{
            background:#ff7b7b;
            color:#fff;
        }

        .category-badge.technicky{
            background:var(--cyan);
            color:#04121a;
        }

        .archive-datetime{
            text-align:right;
            color:#dce5ef;
            font-weight:800;
            line-height:1.4;
        }

        .archive-datetime span{
            display:block;
            color:var(--muted);
            font-size:0.92rem;
            font-weight:700;
        }

        .export-pdf-btn{
            margin-top:8px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-width:118px;
            min-height:34px;
            padding:8px 12px;
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.12);
            background:linear-gradient(180deg, #2db4ff, #156ed6);
            color:#fff;
            font-family:inherit;
            font-size:0.76rem;
            font-weight:900;
            letter-spacing:0.06em;
            text-transform:uppercase;
            cursor:pointer;
            box-shadow:0 10px 24px rgba(21,110,214,0.22);
        }

        .export-pdf-btn:hover{
            filter:brightness(1.08);
        }

        .export-pdf-btn:active{
            transform:translateY(1px);
        }

        .archive-title{
            font-size:1.45rem;
            font-weight:900;
            line-height:1.12;
            text-transform:uppercase;
        }

        .archive-card.mobile .archive-title{
            font-size:1.18rem;
        }

        .archive-subtitle{
            color:var(--yellow);
            font-weight:800;
            text-transform:uppercase;
            letter-spacing:0.05em;
            font-size:0.94rem;
        }

        .archive-address{
            color:#d5dce5;
            font-size:1rem;
            line-height:1.5;
        }

        .archive-counts{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
        }

        .count-box{
            padding:13px 14px;
            border-radius:16px;
            background:#0c1117;
            border:1px solid #1e2731;
        }

        .count-box strong{
            display:block;
            font-size:0.8rem;
            font-weight:900;
            letter-spacing:0.08em;
            text-transform:uppercase;
            color:var(--muted);
        }

        .count-box span{
            display:block;
            margin-top:6px;
            font-size:1.8rem;
            font-weight:900;
        }

        .count-box.idem span{ color:var(--green); }
        .count-box.nejdem span{ color:var(--red); }

        .names-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
        }

        .names-box{
            padding:14px;
            border-radius:16px;
            background:#0b1015;
            border:1px solid #1c2630;
            min-height:128px;
        }

        .names-box strong{
            display:block;
            margin-bottom:10px;
            font-size:0.86rem;
            font-weight:900;
            letter-spacing:0.08em;
            text-transform:uppercase;
        }

        .names-box.idem strong{ color:var(--green); }
        .names-box.nejdem strong{ color:var(--red); }

        .name-list{
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }

        .name-pill{
            padding:8px 11px;
            border-radius:999px;
            font-size:0.9rem;
            font-weight:800;
            text-transform:uppercase;
        }

        .name-pill.idem{
            color:var(--green);
            background:rgba(0,230,118,0.11);
        }

        .name-pill.nejdem{
            color:#ffb2c1;
            background:rgba(255,23,68,0.12);
        }

        .empty-list{
            color:#708090;
            font-weight:700;
        }

        .empty-state{
            padding:34px 20px;
            text-align:center;
            border-radius:20px;
            border:1px dashed #334252;
            background:rgba(12,17,23,0.82);
            color:#d5dde7;
            font-size:1.05rem;
            font-weight:700;
        }

        #debug-panel{
            display:none;
            position:fixed;
            right:10px;
            bottom:10px;
            z-index:200;
            width:360px;
            max-width:calc(100vw - 20px);
            max-height:220px;
            overflow:auto;
            background:rgba(0,0,0,0.88);
            border:1px solid #333;
            border-radius:6px;
            padding:10px;
            font:12px/1.4 monospace;
            color:#ddd;
        }

        #debug-panel strong{ color:#ffeb3b; display:block; margin-bottom:6px; }
        #debug-log{ white-space:pre-wrap; word-break:break-word; }

        body.mode-mobile #mobile-view{
            display:block;
        }

        body:not(.mode-mobile) #tv-view{
            display:block;
        }

        body.mode-tv{
            --tv-header-card-height: 46px;
            --tv-header-card-pad-y: 3px;
            --tv-header-card-pad-x: 6px;
        }

        body.mode-tv .tv-clock-card{
            width:var(--archive-header-control-width);
            height:var(--tv-header-card-height);
            padding:var(--tv-header-card-pad-y) var(--tv-header-card-pad-x);
            border-radius:12px;
            background:linear-gradient(180deg, rgba(21,28,36,0.96), rgba(10,14,19,0.96));
            border:1px solid #212a35;
            box-shadow:0 16px 40px rgba(0,0,0,0.25);
            text-align:center;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        body.mode-tv .tv-clock-card .mobile-timer-label{
            color:#9eacba;
            font-size:0.78rem;
            font-weight:800;
            letter-spacing:0.08em;
            line-height:1.1;
            text-transform:uppercase;
            white-space:nowrap;
            overflow:visible;
        }

        body.mode-tv .tv-clock-card .mobile-card-clock{
            margin-top:2px;
        }

        body.mode-tv #clock.mobile-card-clock{
            font-size:1.26rem;
            font-weight:800;
            line-height:1;
        }

    </style>
</head>
<body>

<div class="header">
    <div class="brand">
        <img src="logo.png" alt="DHZ">
        <div class="brand-copy">
            <strong>DHZ LEDNICA - ARCHÍV</strong>
            <span id="header-subtitle">Archív výjazdov</span>
        </div>
    </div>
    <div class="header-right">
        <div id="mode-pill" class="mode-pill">TV REŽIM</div>
        <div class="tv-clock-card mobile-timer-card">
            <div class="mobile-timer-label">AKTUÁLNY ČAS</div>
            <div id="clock" class="mobile-card-clock">00:00:00</div>
        </div>
        <a id="dispatch-link" href="./?tv=1" class="btn-link">DISPEČING</a>
        <button id="archive-reset-btn" class="btn-link btn-link-danger" type="button" onclick="resetArchive()">RESET ARCHÍVU</button>
    </div>
</div>

<div class="page">
    <div class="summary-grid">
        <div class="summary-card">
            <div class="summary-label">Počet záznamov</div>
            <div id="summary-total" class="summary-value">0</div>
            <div class="summary-note">Celkový počet archivovaných výjazdov načítaných v zozname.</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Posledný výjazd</div>
            <div id="summary-latest-date" class="summary-value">-</div>
            <div id="summary-latest-title" class="summary-note">Bez údajov</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Posledná aktualizácia</div>
            <div id="summary-updated" class="summary-value">--:--:--</div>
            <div class="summary-note">Dáta sú načítané z databázy.</div>
        </div>
    </div>

    <div id="tv-view" class="view">
        <div id="archive-tv-list" class="cards-tv"></div>
    </div>

    <div id="mobile-view" class="view">
        <div id="archive-mobile-list" class="cards-mobile"></div>
    </div>
</div>

<div id="debug-panel">
    <strong>DEBUG REŽIM</strong>
    <div id="debug-log"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const RESET_PIN = "1234";
const ROOT_PAGE_URL = `${window.location.origin}/`;

function normalizeSearch(search) {
    if (!search) {
        return "";
    }

    const raw = search.startsWith("?") ? search.slice(1) : search;
    return raw ? `?${raw.replace(/\?/g, "&")}` : "";
}

const normalizedSearch = normalizeSearch(window.location.search);
const urlParams = new URLSearchParams(normalizedSearch);
const DEBUG_MODE = urlParams.get("debug") === "1";
const IS_MOBILE_MODE = urlParams.get("mobil") === "1";
const IS_TV_MODE = !IS_MOBILE_MODE;

if (normalizedSearch && normalizedSearch !== window.location.search) {
    window.history.replaceState({}, "", `${window.location.pathname}${normalizedSearch}${window.location.hash}`);
}

applyModeClass();
configureNavigation();

function updateClock() {
    document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK");
}

updateClock();
setInterval(updateClock, 1000);

function logDebug(message, data) {
    const timestamp = new Date().toLocaleTimeString("sk-SK");
    const formatted = data === undefined
        ? `[${timestamp}] ${message}`
        : `[${timestamp}] ${message} ${typeof data === "string" ? data : JSON.stringify(data)}`;

    console.log(formatted);

    if (!DEBUG_MODE) {
        return;
    }

    const panel = document.getElementById("debug-panel");
    const log = document.getElementById("debug-log");
    panel.style.display = "block";
    log.textContent = `${formatted}\n${log.textContent}`.slice(0, 5000);
}

function applyModeClass() {
    document.body.classList.toggle("mode-mobile", IS_MOBILE_MODE);
    document.body.classList.toggle("mode-tv", IS_TV_MODE);
    document.getElementById("mode-pill").innerText = IS_MOBILE_MODE ? "MOBILNÝ REŽIM" : "TV REŽIM";
    document.getElementById("header-subtitle").innerText = "Prehľad archivovaných výjazdov";
}

function buildPersistentParams() {
    const params = new URLSearchParams();

    if (IS_MOBILE_MODE) {
        params.set("mobil", "1");
    } else {
        params.set("tv", "1");
    }

    if (DEBUG_MODE) {
        params.set("debug", "1");
    }

    return params;
}

function configureNavigation() {
    const url = new URL(ROOT_PAGE_URL);
    const params = buildPersistentParams();

    params.forEach((value, key) => {
        url.searchParams.set(key, value);
    });

    document.getElementById("dispatch-link").href = url.toString();
}

async function deleteArchiveBatch(batchSize = 200) {
    while (true) {
        const snapshot = await db.collection("archiv").limit(batchSize).get();

        if (snapshot.empty) {
            return;
        }

        const batch = db.batch();
        snapshot.docs.forEach((doc) => {
            batch.delete(doc.ref);
        });

        await batch.commit();

        if (snapshot.size < batchSize) {
            return;
        }
    }
}

async function resetArchive() {
    const pin = prompt("Zadaj PIN pre reset archívu:");
    if (pin === null) {
        return;
    }

    if (pin !== RESET_PIN) {
        alert("Nesprávny PIN.");
        logDebug("Reset archívu zamietnutý", "Nesprávny PIN");
        return;
    }

    if (!confirm("Naozaj chceš vymazať celý archív?")) {
        return;
    }

    const button = document.getElementById("archive-reset-btn");
    const originalText = button.innerText;

    button.disabled = true;
    button.innerText = "MAŽEM ARCHÍV...";

    try {
        await deleteArchiveBatch();
        logDebug("Archív bol vymazaný");
        alert("Archív bol vymazaný.");
    } catch (error) {
        logDebug("Reset archívu zlyhal", error.message || String(error));
        console.error(error);
        alert("Reset archívu zlyhal.");
    } finally {
        button.disabled = false;
        button.innerText = originalText;
    }
}

function getDispatchCategory(udalost, podtyp) {
    const upperPodtyp = (podtyp || "").toUpperCase();
    const upperUdalost = (udalost || "").toUpperCase();

    if (upperPodtyp === "AED" || upperUdalost.includes("AED")) {
        return "AED";
    }

    const text = `${udalost || ""} ${podtyp || ""}`.toLowerCase();
    if (
        text.includes("nehoda") ||
        text.includes("voda") ||
        text.includes("vody") ||
        text.includes("strom") ||
        text.includes("technic")
    ) {
        return "TECHNICKÝ VÝJAZD";
    }

    return "POŽIAR";
}

function getTimestampMs(data) {
    if (typeof data.timestamp === "number") {
        return data.timestamp;
    }

    if (data.datum && typeof data.datum.toMillis === "function") {
        return data.datum.toMillis();
    }

    if (data.archivedAtIso) {
        const parsed = Date.parse(data.archivedAtIso);
        if (!Number.isNaN(parsed)) {
            return parsed;
        }
    }

    if (typeof data.archivedAt === "number") {
        return data.archivedAt;
    }

    return Date.now();
}

function toArray(value) {
    return Array.isArray(value) ? value.filter(Boolean) : [];
}

function normalizeArchiveItem(doc) {
    const data = doc.data();
    const timestamp = getTimestampMs(data);
    const idem = toArray(data.idem || data.isli || (data.odpovede && data.odpovede.idem));
    const nejdem = toArray(data.nejdem || data.nejdli || (data.odpovede && data.odpovede.nejdem));
    const udalost = data.udalost || data.typ || "";
    const podtyp = data.podtyp || data.typUdalosti || "";
    const adresa = data.adresa || data.miesto || "";
    const kategoria = data.kategoriaVyjazdu || getDispatchCategory(udalost, podtyp);
    const date = new Date(timestamp);

    return {
        id: doc.id,
        timestamp,
        datum: data.datumText || date.toLocaleDateString("sk-SK"),
        cas: data.cas || date.toLocaleTimeString("sk-SK", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
        udalost: udalost || "Neznáma udalosť",
        podtyp,
        adresa: adresa || "Adresa nebola uložená",
        kategoria,
        pocetIdem: typeof data.pocetIdem === "number" ? data.pocetIdem : idem.length,
        pocetNejdem: typeof data.pocetNejdem === "number" ? data.pocetNejdem : nejdem.length,
        idem,
        nejdem
    };
}

function createNameList(names, type) {
    const wrapper = document.createElement("div");
    wrapper.className = "name-list";

    if (!names.length) {
        const empty = document.createElement("div");
        empty.className = "empty-list";
        empty.innerText = "Bez odpovede";
        wrapper.appendChild(empty);
        return wrapper;
    }

    names.forEach((name) => {
        const pill = document.createElement("div");
        pill.className = `name-pill ${type}`;
        pill.innerText = name;
        wrapper.appendChild(pill);
    });

    return wrapper;
}

function getCategoryClass(category) {
    const value = (category || "").toUpperCase();

    if (value === "AED") {
        return "aed";
    }

    if (value.includes("TECHNICK")) {
        return "technicky";
    }

    return "";
}

function escapeHtml(value) {
    const div = document.createElement("div");
    div.innerText = value == null ? "" : String(value);
    return div.innerHTML;
}

function renderReportNames(names, type = "") {
    if (!names.length) {
        return `<div class="name-list-columns"><div class="empty">Bez odpovede</div></div>`;
    }

    return `<div class="name-list-columns">${names
        .map((name) => `<span class="person-pill ${escapeHtml(type)}">${escapeHtml(name)}</span>`)
        .join("")}</div>`;
}

function buildArchiveReportHtml(item) {
    const generatedAt = new Date().toLocaleString("sk-SK");
    const safeTitle = escapeHtml(item.udalost);
    const safePodtyp = escapeHtml(item.podtyp || "-");
    const safeAddress = escapeHtml(item.adresa);
    const safeCategory = escapeHtml(item.kategoria);
    const safeDate = escapeHtml(item.datum);
    const safeTime = escapeHtml(item.cas);

function exportArchivePdf(item) {
    const reportWindow = window.open("", "_blank", "width=960,height=720");

    if (!reportWindow) {
        alert("Pre export PDF povoľ v prehliadači otváranie nových okien.");
        return;
    }

    reportWindow.document.open();
    reportWindow.document.write(buildArchiveReportHtml(item));
    reportWindow.document.close();
    logDebug("PDF report pripravený", { id: item.id, udalost: item.udalost });
}

function createArchiveCard(item, mobile = false) {
    const card = document.createElement("article");
    card.className = `archive-card${mobile ? " mobile" : ""}`;

    const top = document.createElement("div");
    top.className = "archive-card-top";

    const badge = document.createElement("div");
    const categoryClass = getCategoryClass(item.kategoria);
    badge.className = `category-badge${categoryClass ? ` ${categoryClass}` : ""}`;
    badge.innerText = item.kategoria;

    const dateWrap = document.createElement("div");
    dateWrap.className = "archive-datetime";
    dateWrap.innerHTML = `${item.datum}<span>${item.cas}</span>`;

    const exportButton = document.createElement("button");
    exportButton.className = "export-pdf-btn";
    exportButton.type = "button";
    exportButton.innerText = "EXPORT PDF";
    exportButton.addEventListener("click", () => exportArchivePdf(item));
    dateWrap.appendChild(exportButton);

    top.appendChild(badge);
    top.appendChild(dateWrap);
    card.appendChild(top);

    const title = document.createElement("div");
    title.className = "archive-title";
    title.innerText = item.udalost;
    card.appendChild(title);

    if (item.podtyp) {
        const subtitle = document.createElement("div");
        subtitle.className = "archive-subtitle";
        subtitle.innerText = item.podtyp;
        card.appendChild(subtitle);
    }

    const address = document.createElement("div");
    address.className = "archive-address";
    address.innerText = item.adresa;
    card.appendChild(address);

    const counts = document.createElement("div");
    counts.className = "archive-counts";

    const idemBox = document.createElement("div");
    idemBox.className = "count-box idem";
    idemBox.innerHTML = "<strong>IDEM</strong>";
    const idemValue = document.createElement("span");
    idemValue.innerText = item.pocetIdem;
    idemBox.appendChild(idemValue);

    const nejdemBox = document.createElement("div");
    nejdemBox.className = "count-box nejdem";
    nejdemBox.innerHTML = "<strong>NEJDEM</strong>";
    const nejdemValue = document.createElement("span");
    nejdemValue.innerText = item.pocetNejdem;
    nejdemBox.appendChild(nejdemValue);

    counts.appendChild(idemBox);
    counts.appendChild(nejdemBox);
    card.appendChild(counts);

    const namesGrid = document.createElement("div");
    namesGrid.className = "names-grid";

    const idemNames = document.createElement("div");
    idemNames.className = "names-box idem";
    idemNames.innerHTML = "<strong>IDEM</strong>";
    idemNames.appendChild(createNameList(item.idem, "idem"));

    const nejdemNames = document.createElement("div");
    nejdemNames.className = "names-box nejdem";
    nejdemNames.innerHTML = "<strong>NEJDEM</strong>";
    nejdemNames.appendChild(createNameList(item.nejdem, "nejdem"));

    namesGrid.appendChild(idemNames);
    namesGrid.appendChild(nejdemNames);
    card.appendChild(namesGrid);

    return card;
}

function renderEmptyState(container) {
    container.innerHTML = "";
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.innerText = "Archív zatiaľ neobsahuje žiadne výjazdy.";
    container.appendChild(empty);
}

function renderArchive(items) {
    const tvList = document.getElementById("archive-tv-list");
    const mobileList = document.getElementById("archive-mobile-list");
    tvList.innerHTML = "";
    mobileList.innerHTML = "";

    if (!items.length) {
        renderEmptyState(tvList);
        renderEmptyState(mobileList);
        return;
    }

    items.forEach((item) => {
        tvList.appendChild(createArchiveCard(item, false));
        mobileList.appendChild(createArchiveCard(item, true));
    });
}

function updateSummary(items) {
    document.getElementById("summary-total").innerText = items.length;
    document.getElementById("summary-updated").innerText = new Date().toLocaleTimeString("sk-SK");

    if (!items.length) {
        document.getElementById("summary-latest-date").innerText = "-";
        document.getElementById("summary-latest-title").innerText = "Bez údajov";
        return;
    }

    const latest = items[0];
    document.getElementById("summary-latest-date").innerText = latest.datum;
    document.getElementById("summary-latest-title").innerText = `${latest.udalost} • ${latest.adresa}`;
}

function loadArchive() {
    db.collection("archiv").onSnapshot((snapshot) => {
        const items = snapshot.docs
            .map((doc) => normalizeArchiveItem(doc))
            .sort((a, b) => b.timestamp - a.timestamp);

        logDebug("Archív načítaný", { pocet: items.length, rezim: IS_MOBILE_MODE ? "mobil" : "tv" });
        updateSummary(items);
        renderArchive(items);
    }, (error) => {
        logDebug("Chyba načítania archívu", error.message || String(error));
        const tvList = document.getElementById("archive-tv-list");
        const mobileList = document.getElementById("archive-mobile-list");
        renderEmptyState(tvList);
        renderEmptyState(mobileList);
    });
}

logDebug("Archív pripravený", { debug: DEBUG_MODE, mobil: IS_MOBILE_MODE, tv: IS_TV_MODE });
window.addEventListener("load", loadArchive);
</script>
