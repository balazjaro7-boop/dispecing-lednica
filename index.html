<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHZ Lednica - DISPEČING</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root{ --bg:#07090c; --panel:#10141a; --green:#00e676; --gray:#888; --red:#ff1744; --yellow:#ffeb3b; }
        body{ margin:0; height:100vh; display:flex; flex-direction:column; font-family:Segoe UI,sans-serif; background:var(--bg); color:#fff; overflow:hidden; }
        .header{ display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#000; border-bottom:2px solid #222; flex:0 0 auto; }
        .brand{ font-size:1.3rem; font-weight:700; color:#aaa; }
        .center-timer{ font-size:1.4rem; font-family:monospace; color:var(--yellow); text-align: center; }
        .clock{ font-family:monospace; font-size:1.8rem; font-weight:bold; }
        .btn-reset{ background:var(--red); color:#fff; border:none; padding:8px 15px; cursor:pointer; font-weight:bold; border-radius:3px; }
        
        #banner { display:none; flex:0 0 auto; padding:15px; text-align:center; animation:stroboskop 0.8s infinite; border-bottom:2px solid #000; }
        @keyframes stroboskop { 0% { background:#8b0000; } 50% { background:#ffeb3b; color:#000; } 100% { background:#8b0000; } }
        
        .main{ flex:1; display:grid; grid-template-columns: 300px 1fr 300px; overflow:hidden; padding:10px; gap:15px; }
        .map-container { background: var(--panel); border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #222; }
        #map-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .col{ display:flex; flex-direction:column; background:var(--panel); border-radius:4px; padding:15px; overflow:hidden; }
        .title{ text-align:center; font-size:1.5rem; font-weight:800; border-bottom:2px solid #222; padding-bottom:10px; margin-bottom:15px; }
        .item{ padding:8px 12px; font-size:1.3rem; font-weight:bold; text-transform:uppercase; border-radius:3px; margin-bottom:8px; }
        .idem{ color:var(--green); background:rgba(0,230,118,0.1); }
        .nejdem{ color:var(--gray); background:rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">DHZ LEDNICA</div>
    <div class="center-timer">ČAS VÝJAZDU: <span id="timer">00:00</span></div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="clock" class="clock">00:00:00</div>
        <button class="btn-reset" onclick="manualReset()">RESET</button>
    </div>
</div>

<div id="banner">
    <div style="font-size:2rem; font-weight:900;"><span id="typ"></span> : <span id="adresa"></span></div>
</div>

<div class="main">
    <div class="col"><div class="title" style="color:var(--green);">IDEM</div><div id="idem"></div></div>
    <div class="map-container">
        <div id="map-msg" style="color:#444; font-weight:bold;">ČAKÁM NA ÚDAJE...</div>
        <img id="map-img" src="">
    </div>
    <div class="col"><div class="title" style="color:var(--gray);">NEJDEM</div><div id="nejdem"></div></div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s", authDomain: "hasici-lednica.firebaseapp.com", projectId: "hasici-lednica" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let timerInterval;

setInterval(() => { document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK"); }, 1000);

db.collection("vyjazdy").doc("active").onSnapshot(doc => {
    const idemDiv = document.getElementById("idem"), nejdemDiv = document.getElementById("nejdem");
    const banner = document.getElementById("banner"), mapImg = document.getElementById("map-img"), mapMsg = document.getElementById("map-msg");
    idemDiv.innerHTML = ""; nejdemDiv.innerHTML = "";

    if (!doc.exists) {
        banner.style.display = "none"; mapImg.style.display = "none"; mapMsg.style.display = "block";
        document.getElementById("timer").innerText = "00:00"; if(timerInterval) clearInterval(timerInterval); return;
    }

    const d = doc.data(), m = d.__metadata || {};
    if (m.typ) {
        banner.style.display = "block";
        document.getElementById("typ").innerText = m.typ;
        document.getElementById("adresa").innerText = m.miesto || "";

        if (m.miesto) {
            mapMsg.style.display = "none";
            mapImg.style.display = "block";
            
            // ✅ STATICKÁ MAPA (Yandex - nepotrebuje kľúč a funguje všade)
            // Ukáže bod výjazdu a okolie Lednice
            const adr = encodeURIComponent(m.miesto + ", Slovensko");
            mapImg.src = `https://static-maps.yandex.ru/1.x/?lang=sk_SK&ll=18.232,49.111&z=13&l=map&pt=18.2324,49.1111,pm2rdm~${adr},pm2gnm&size=650,450`;
        }
        startTimer(m.timestamp);
    }

    Object.keys(d).forEach(k => {
        if (k === "__metadata") return;
        const div = document.createElement("div");
        div.className = "item " + (d[k] === "IDEM" ? "idem" : "nejdem");
        div.innerText = k;
        (d[k] === "IDEM" ? idemDiv : nejdemDiv).appendChild(div);
    });
});

function startTimer(s) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const e = Math.floor((Date.now() - s) / 1000);
        document.getElementById("timer").innerText = `${Math.floor(e/60)}:${(e%60).toString().padStart(2,"0")}`;
    }, 1000);
}

async function manualReset() { if (confirm("Reset?")) await db.collection("vyjazdy").doc("active").delete(); }
</script>
</body>
</html>
