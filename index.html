<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHZ Lednica - DISPEČING</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
:root{ --bg:#07090c; --panel:#10141a; --green:#00e676; --gray:#888; --yellow:#ffeb3b; }

body{ margin:0; font-family:Segoe UI; background:var(--bg); color:#fff; }

.header{ display:flex; justify-content:space-between; align-items:center; padding:10px; background:#000; }

.brand{ display:flex; align-items:center; gap:10px; font-weight:bold; }
.brand img{ height:40px; }

.center{text-align:center;}
.center-title{font-size:0.8rem;color:#aaa;}
#timer{font-size:1.6rem;color:var(--yellow);}

.clock{font-size:1.5rem;}

button{background:#222;color:#aaa;border:1px solid #333;padding:5px;cursor:pointer;}

.main{display:grid;grid-template-columns:300px 1fr 300px;height:80vh;}

.map-container{display:flex;align-items:center;justify-content:center;}
#map-frame{width:100%;height:100%;border:none;}

</style>
</head>

<body>

<div class="header">
    <div class="brand">
        <img src="logo.png">
        DHZ LEDNICA
    </div>

    <div class="center">
        <div class="center-title">Čas od vyhlásenia udalosti:</div>
        <div id="timer">0:00</div>
    </div>

    <div>
        <span id="clock"></span>
        <button onclick="window.location.href='archiv.html'">Archív</button>
        <button onclick="manualReset()">RESET</button>
    </div>
</div>

<div class="main">
    <div id="idem"></div>

    <div class="map-container">
        <iframe id="map-frame"></iframe>
    </div>

    <div id="nejdem"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

setInterval(()=>{document.getElementById("clock").innerText=new Date().toLocaleTimeString("sk-SK");},1000);

let timerInterval;

async function spracujVstup(){
    const params=new URLSearchParams(window.location.search);
    const u=params.get('udalost');
    const adr=params.get('miesto');
    const akc=params.get('akcia');

    const ref=db.collection("vyjazdy").doc("active");

    if(u){
        await ref.set({__metadata:{typ:u,miesto:adr||"",timestamp:Date.now()}},{merge:true});
        window.history.replaceState({},'',window.location.pathname);
    }

    if(akc){
        let meno=localStorage.getItem('h_meno')||prompt("Zadaj meno:");
        if(meno){
            localStorage.setItem('h_meno',meno);
            await ref.set({[meno]:akc},{merge:true});
        }
        window.history.replaceState({},'',window.location.pathname);
    }
}

db.collection("vyjazdy").doc("active").onSnapshot(doc=>{
    if(!doc.exists){
        document.getElementById("timer").innerText="0:00";
        return;
    }

    const d=doc.data();
    const m=d.__metadata||{};

    if(m.miesto){
        document.getElementById("map-frame").src=
        `https://www.google.com/maps?saddr=${encodeURIComponent("Lednica 243")}&daddr=${encodeURIComponent(m.miesto)}&dirflg=d&output=embed`;
    }

    startTimer(m.timestamp);
});

function startTimer(start){
    if(timerInterval) clearInterval(timerInterval);

    timerInterval=setInterval(()=>{
        const diff=Math.floor((Date.now()-start)/1000);
        document.getElementById("timer").innerText=
        `${Math.floor(diff/60)}:${(diff%60).toString().padStart(2,"0")}`;
    },1000);
}

async function manualReset(){
    if(confirm("Resetovať výjazd?")){
        await db.collection("vyjazdy").doc("active").delete();
    }
}

window.onload=spracujVstup;
</script>

</body>
</html>
