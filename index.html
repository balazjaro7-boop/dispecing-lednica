<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DHZ Lednica - DISPEČING</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;height:100vh;display:flex;flex-direction:column;font-family:Segoe UI,sans-serif;background:#07090c;color:#fff;overflow:hidden;}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#000;border-bottom:2px solid #222;}
.brand{font-weight:700;color:#aaa;}
.center-timer{font-family:monospace;color:#ffeb3b;text-align:center;}
.clock{font-family:monospace;font-size:1.5rem;}
.btn{padding:6px 12px;border:0;cursor:pointer;font-weight:bold;border-radius:3px;color:#fff;}
#banner{display:none;padding:10px;text-align:center;background:#8b0000;animation:blink 0.8s infinite;}
@keyframes blink{50%{background:#ffeb3b;color:#000;}}

.main{flex:1;display:grid;grid-template-columns:300px 1fr 300px;gap:10px;padding:10px;overflow:hidden;}
.col{background:#10141a;padding:10px;overflow:auto;}
.title{text-align:center;font-weight:bold;margin-bottom:10px;}
.item{padding:5px;margin:2px 0;font-weight:bold;}
.idem{color:#00e676;}
.nejdem{color:#888;}

#map{width:100%;height:100%;display:none;}
.map-box{background:#10141a;display:flex;align-items:center;justify-content:center;}
</style>
</head>

<body>

<div class="header">
<div class="brand">DHZ LEDNICA</div>
<div class="center-timer">ČAS: <span id="timer">00:00</span></div>
<div class="clock" id="clock"></div>
</div>

<div id="banner">
<strong><span id="typ"></span></strong> : <span id="adresa"></span>
</div>

<div class="main">
<div class="col">
<div class="title">IDEM</div>
<div id="idem"></div>
</div>

<div class="map-box">
<div id="map-msg">ČAKÁM NA VÝJAZD...</div>
<div id="map"></div>
</div>

<div class="col">
<div class="title">NEJDEM</div>
<div id="nejdem"></div>
</div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
authDomain: "hasici-lednica.firebaseapp.com",
projectId: "hasici-lednica"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CLOCK
setInterval(()=>document.getElementById("clock").innerText=new Date().toLocaleTimeString(),1000);

// MAPA
let map = L.map('map').setView([49.0165,18.3010],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'&copy; OpenStreetMap'
}).addTo(map);

let routeLayer;

const START = [49.0165,18.3010]; // Lednica 243

async function drawRoute(dest) {
const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dest)}`);
const d = await r.json();
if(!d.length) return;

const end = [parseFloat(d[0].lat),parseFloat(d[0].lon)];

const route = await fetch(`https://router.project-osrm.org/route/v1/driving/${START[1]},${START[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`);
const data = await route.json();

const coords = data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

if(routeLayer) map.removeLayer(routeLayer);

routeLayer = L.polyline(coords,{weight:5}).addTo(map);

L.marker(START).addTo(map).bindPopup("DHZ Lednica");
L.marker(end).addTo(map).bindPopup(dest);

map.fitBounds(routeLayer.getBounds());
}

// FIRESTORE LIVE
db.collection("vyjazdy").doc("active").onSnapshot(async doc=>{

const idem=document.getElementById("idem");
const nejdem=document.getElementById("nejdem");

idem.innerHTML="";
nejdem.innerHTML="";

if(!doc.exists){
document.getElementById("map-msg").style.display="block";
document.getElementById("map").style.display="none";
document.getElementById("banner").style.display="none";
return;
}

const d=doc.data();
const m=d.__metadata||{};

document.getElementById("banner").style.display="block";
document.getElementById("typ").innerText=m.typ||"";
document.getElementById("adresa").innerText=m.miesto||"";

document.getElementById("map-msg").style.display="none";
document.getElementById("map").style.display="block";

if(m.miesto) drawRoute(m.miesto);

// timer
startTimer(m.timestamp||Date.now());

// listy
Object.keys(d).forEach(k=>{
if(k==="__metadata")return;
let div=document.createElement("div");
div.className="item "+(d[k]==="IDEM"?"idem":"nejdem");
div.innerText=k;
(d[k]==="IDEM"?idem:nejdem).appendChild(div);
});

});

// TIMER
let t;
function startTimer(start){
if(t)clearInterval(t);
t=setInterval(()=>{
let s=Math.floor((Date.now()-start)/1000);
document.getElementById("timer").innerText=
Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
},1000);
}
</script>

</body>
</html>
