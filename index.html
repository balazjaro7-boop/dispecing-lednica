<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHZ LEDNICA - DISPEČING</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #cccccc; 
            --accent-red: #d32f2f;
            --accent-green: #2e7d32;
            --text-dark: #000000; 
            --header-bg: #141414;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: white; 
            margin: 0; padding: 0; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* Horná lišta */
        .header { 
            background-color: var(--header-bg); 
            padding: 10px 30px; 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 4px solid var(--accent-red);
            height: 90px;
            box-sizing: border-box;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-logo { height: 75px; width: auto; }
        .header-title { font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Veľké biele hodiny */
        .clock { 
            font-size: 55px; 
            font-weight: 900; 
            color: #ffffff; 
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 2px;
            line-height: 1;
        }

        /* Box pre text výjazdu */
        .info-box { 
            background: #222; padding: 12px; margin: 10px 20px; 
            border: 2px solid #ffeb3b; color: #ffeb3b; 
            font-size: 24px; font-weight: bold; text-align: center; border-radius: 4px;
            text-transform: uppercase;
        }

        /* Hlavný priestor s tabuľkami */
        .main-container { display: flex; flex: 1; gap: 20px; padding: 10px 20px; box-sizing: border-box; }

        .section { 
            flex: 1; background-color: var(--card-bg); border-radius: 8px;
            display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        
        .section-header { 
            padding: 15px; font-size: 26px; font-weight: 900; text-align: center; 
            background: rgba(0,0,0,0.05);
            border-bottom: 4px solid rgba(0,0,0,0.1); 
        }
        .idem-title { color: var(--accent-green); }
        .nejdem-title { color: var(--accent-red); }

        /* Mriežka mien - 2 stĺpce */
        .names-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; align-content: start; }
        
        .name-item { 
            font-size: 28px; font-weight: 900; color: var(--text-dark); 
            padding: 12px; background: rgba(255,255,255,0.5); 
            border-radius: 4px; text-transform: uppercase;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            border-left: 8px solid rgba(0,0,0,0.2);
        }

        /* Spodná lišta s odpočtom */
        .footer { padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; background: #111; height: 50px; }
        .timer-container { position: absolute; left: 50%; transform: translateX(-50%); color: #888; font-weight: bold; font-size: 18px; }
        #reset-timer { color: var(--accent-red); font-size: 20px; font-weight: 900; }
        .nav-link { color: #555; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .nav-link:hover { color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <img src="logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
        <div class="header-title">DHZ Lednica | <span style="font-weight: 300; color: #888;">Dispečing</span></div>
    </div>
    <div class="clock" id="live-clock">00:00:00</div>
</div>

<div id="vyjazd-info" class="info-box" style="display:none;"></div>

<div class="main-container">
    <div class="section">
        <div class="section-header idem-title">IDEM</div>
        <div id="list-idem" class="names-grid"></div>
    </div>

    <div class="section">
        <div class="section-header nejdem-title">NEJDEM</div>
        <div id="list-nejdem" class="names-grid"></div>
    </div>
</div>

<div class="footer">
    <a href="archiv.html" class="nav-link">Kniha výjazdov (Archív)</a>
    
    <div class="timer-container">
        Automatický reset za: <span id="reset-timer">--:--</span>
    </div>

    <div class="nav-link" style="cursor: default;">Live Systém v1.2</div>
</div>

<script>
    // --- SEM VLOŽ SVOJU KONFIGURÁCIU Z FIREBASE ---
    const firebaseConfig = {
        apiKey: "TVOJ_API_KEY",
        authDomain: "hasici-lednica.firebaseapp.com",
        projectId: "hasici-lednica",
        storageBucket: "hasici-lednica.appspot.com",
        messagingSenderId: "747340639310",
        appId: "TVOJE_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("vyjazdy").doc("active");

    // Živé hodiny
    function updateClock() {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('sk-SK');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Funkcia pre Archiváciu a Reset
    async function archiveAndReset(data) {
        const huraIdem = [];
        const smolaNejdem = [];
        for (const [meno, stav] of Object.entries(data)) {
            if (meno !== 'lastUpdate' && meno !== 'infoText') {
                if (stav === "IDEM") huraIdem.push(meno);
                if (stav === "NEMÔŽEM" || stav === "NEJDEM" || stav === "NEJDE") smolaNejdem.push(meno);
            }
        }
        if (huraIdem.length > 0 || smolaNejdem.length > 0) {
            await db.collection("archiv").add({
                datum: firebase.firestore.FieldValue.serverTimestamp(),
                info: data.infoText || "BEZ TEXTU",
                isli: huraIdem,
                nejdli: smolaNejdem
            });
        }
        // Reset polí na NEZADANÉ
        const updates = { infoText: "" };
        Object.keys(data).forEach(key => {
            if (key !== 'lastUpdate' && key !== 'infoText') updates[key] = "NEZADANÉ";
        });
        await docRef.update(updates);
    }

    // Zachytenie parametrov z URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('meno') || params.get('info')) {
        let up = { lastUpdate: firebase.firestore.FieldValue.serverTimestamp() };
        if (params.get('meno')) up[params.get('meno')] = params.get('akcia');
        if (params.get('info')) up.infoText = params.get('info').replace(/_/g, ' ');
        
        docRef.update(up).then(() => {
            window.history.replaceState({}, document.title, "/");
        });
    }

    // Sledovanie databázy
    docRef.onSnapshot((doc) => {
        const data = doc.data();
        if (!data) return;

        // Info o výjazde
        const infoDiv = document.getElementById("vyjazd-info");
        if (data.infoText) {
            infoDiv.innerText = "HLÁSENIE: " + data.infoText;
            infoDiv.style.display = "block";
        } else {
            infoDiv.style.display = "none";
        }

        // Zoznamy mien
        const lI = document.getElementById("list-idem");
        const lN = document.getElementById("list-nejdem");
        lI.innerHTML = ""; lN.innerHTML = "";

        // Odpočítavanie (30 minút = 1800000 ms)
        if (data.lastUpdate) {
            const updateTimer = () => {
                const diff = (data.lastUpdate.toDate().getTime() + 1800000) - new Date().getTime();
                if (diff <= 0) {
                    archiveAndReset(data);
                    document.getElementById("reset-timer").innerText = "00:00";
                } else {
                    const m = Math.floor(diff / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById("reset-timer").innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }
            };
            setInterval(updateTimer, 1000);
            updateTimer();
        }

        // Zoradenie mien a vykreslenie
        const entries = Object.entries(data)
            .filter(([m]) => m !== 'lastUpdate' && m !== 'infoText')
            .sort((a, b) => a[0].localeCompare(b[0]));

        for (const [m, s] of entries) {
            if (s === "IDEM") {
                lI.innerHTML += `<div class="name-item">${m}</div>`;
            } else if (s === "NEMÔŽEM" || s === "NEJDEM" || s === "NEJDE") {
                lN.innerHTML += `<div class="name-item">${m}</div>`;
            }
        }
    });
</script>

</body>
</html>
