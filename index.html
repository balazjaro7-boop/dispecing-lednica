<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHZ Lednica - DISPEČING</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root{ --bg:#07090c; --panel:#10141a; --green:#00e676; --gray:#888; --red:#ff1744; --yellow:#ffeb3b; }
        body{ margin:0; height:100vh; display:flex; flex-direction:column; font-family:Segoe UI,sans-serif; background:var(--bg); color:#fff; overflow:hidden; }
        .header{ display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#000; border-bottom:2px solid #222; flex:0 0 auto; }
        .brand{ font-size:1.3rem; font-weight:700; color:#aaa; display:flex; align-items:center; gap:10px; }
        .brand img { height: 45px; width: auto; }
        .center-timer{ font-size:1.4rem; font-family:monospace; color:var(--yellow); text-align:center; line-height: 1.2; }
        .clock{ font-family:monospace; font-size:1.8rem; font-weight:bold; }
        .btn-action{ color:#fff; border:1px solid #333; padding:6px 12px; cursor:pointer; font-size:0.85rem; border-radius:3px; text-decoration:none; font-weight:bold; }
        .btn-archiv { background: var(--green); }
        .btn-reset { background: var(--red); border:none; }
        #banner { display:none; flex:0 0 auto; padding:12px; text-align:center; animation:stroboskop 0.8s infinite; border-bottom:2px solid #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @keyframes stroboskop { 0%, 100% { background:#8b0000; color:#fff; } 50% { background:var(--yellow); color:#000; } }
        .main{ flex:1; display:grid; grid-template-columns: 300px 1fr 300px; padding:10px; gap:15px; overflow:hidden; }
        #map { background: #eee; border-radius:4px; border:1px solid #222; height:100%; width:100%; }
        .col{ display:flex; flex-direction:column; background:var(--panel); border-radius:4px; padding:10px; overflow:hidden; }
        .title{ text-align:center; font-size:1.5rem; font-weight:800; border-bottom:2px solid #222; padding-bottom:5px; margin-bottom:10px; }
        .item{ padding:8px 12px; font-size:1.3rem; font-weight:bold; text-transform:uppercase; border-radius:3px; margin-bottom:5px; }
        .idem{ color:var(--green); background:rgba(0,230,118,0.1); }
        .nejdem{ color:var(--gray); background:rgba(255,255,255,0.05); }

        /* SKRYTIE MAPY A DISPEČINGU NA MOBILE */
        @media (max-width: 1024px){
            .main, .header, #banner { display: none !important; }
            body { background: #000; overflow: auto; display: block; height: auto; }
            #mobile-response { display: block !important; padding: 40px 20px; text-align: center; }
            .mob-btn { display: block; width: 100%; padding: 20px; margin: 10px 0; font-size: 1.5rem; font-weight: bold; border-radius: 10px; border: none; color: #fff; }
        }
    </style>
</head>
<body>

<div id="mobile-response" style="display:none;">
    <h1 id="mob-status" style="color: var(--yellow);">SPRACOVÁVAM...</h1>
    <div id="mob-info" style="font-size: 1.2rem; margin-bottom: 30px;"></div>
    <button class="mob-btn" style="background: var(--green);" onclick="window.close()">ZAVRIEŤ OKNO</button>
</div>

<div class="header">
    <div class="brand"><img src="logo.png" alt="DHZ"><span>DHZ LEDNICA - DISPEČING</span></div>
    <div class="center-timer">VÝJAZD TRVÁ<br><span id="timer" style="font-size: 1.8rem; font-weight: bold;">00:00</span></div>
    <div style="display:flex; align-items:center; gap:15px;">
        <div id="clock" class="clock">00:00:00</div>
        <div style="display:flex; gap:8px;">
            <a href="archiv.html" class="btn-action btn-archiv">ARCHÍV</a>
            <button class="btn-action btn-reset" onclick="manualReset()">RESET</button>
        </div>
    </div>
</div>

<div id="banner">
    <div style="font-size:1.8rem; font-weight:900; text-transform:uppercase;">
        <span id="prefix"></span> : <span id="typ"></span> : <span id="adresa"></span>
    </div>
</div>

<div class="main">
    <div class="col"><div class="title" style="color:var(--green);">IDEM</div><div id="idem" class="list"></div></div>
    <div id="map"></div>
    <div class="col"><div class="title" style="color:var(--red);">NEJDEM</div><div id="nejdem" class="list"></div></div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s", authDomain: "hasici-lednica.firebaseapp.com", projectId: "hasici-lednica" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let timerInterval, map, routeLayer, markerCiel;
const hasicaren = [49.109077, 18.214097]; 

// Inicializácia mapy len ak nie sme na mobile
function initMap() {
    if (window.innerWidth > 1024) {
        map = L.map('map', { zoomControl: false }).setView(hasicaren, 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker(hasicaren).addTo(map).bindPopup("HASIČSKÁ ZBROJNICA").openPopup();
    }
}

async function spracujVstup() {
    const params = new URLSearchParams(window.location.search);
    const u = params.get('udalost'), adr = params.get('miesto'), akc = params.get('akcia'), t = params.get('typ');
    const ref = db.collection("vyjazdy").doc("active");

    if (u) {
        await ref.set({ __metadata: { typ: u, miesto: adr || "", timestamp: Date.now() } }, { merge: true });
        sendPushover(u, adr, t);
        window.history.replaceState({}, '', window.location.pathname);
    }
    
    if (akc) {
        let meno = localStorage.getItem('h_meno') || prompt("Zadaj meno:");
        if (meno) { 
            localStorage.setItem('h_meno', meno); 
            await ref.set({ [meno]: akc }, { merge: true }); 
            if (window.innerWidth <= 1024) {
                document.getElementById('mob-status').innerText = "OK, NAHLÁSENÉ!";
                document.getElementById('mob-info').innerText = meno + " -> " + akc;
            }
        }
        window.history.replaceState({}, '', window.location.pathname);
    }
}

function sendPushover(udalost, miesto, skupinaTyp) {
    const apiToken = "arrtgeqpd5uczfjk1x918fgziguqp9";
    const groupVyjazd = (skupinaTyp === "AED") ? "gzv839iw4b249tqay7jicqzaw53w42" : "g796q69yjbfy1v2e2kc5enwqn57j1x";
    const baseUrl = "https://hasici-lednica.web.app/index.html";
    
    // Pridanie odkazov priamo do správy, aby sa dalo hlásiť z notifikácie
    const msg = `<b>UDALOSŤ:</b> ${udalost}\n<b>MIESTO:</b> ${miesto || "Nezadané"}\n\n<a href="${baseUrl}?akcia=IDEM">✅ IDEM</a>  <a href="${baseUrl}?akcia=NEJDEM">❌ NEJDEM</a>`;

    fetch("https://api.pushover.net/1/messages.json", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
            token: apiToken, user: groupVyjazd, message: msg, title: "🚨 DHZ LEDNICA", priority: 2, sound: "siren", html: 1, url: `http://maps.google.com/?q=${encodeURIComponent(miesto)}`, url_title: "📍 NAVIGOVAŤ"
        })
    }).then(r => console.log("Pushover odoslaný")).catch(e => console.error("Pushover chyba", e));
}

db.collection("vyjazdy").doc("active").onSnapshot(async doc => {
    if (window.innerWidth <= 1024) return; // Na mobile nesledujeme snapshoty pre dispečing

    const idemDiv = document.getElementById("idem"), nejdemDiv = document.getElementById("nejdem");
    const banner = document.getElementById("banner");
    idemDiv.innerHTML = ""; nejdemDiv.innerHTML = "";

    if (!doc.exists) {
        banner.style.display = "none";
        if(routeLayer) map.removeLayer(routeLayer);
        if(markerCiel) map.removeLayer(markerCiel);
        document.getElementById("timer").innerText = "00:00";
        if(timerInterval) clearInterval(timerInterval);
        return;
    }

    const d = doc.data(), m = d.__metadata || {};
    if (m.typ) {
        banner.style.display = "block";
        const textUdalosti = m.typ.toLowerCase();
        document.getElementById("prefix").innerText = (textUdalosti.includes("nehoda") || textUdalosti.includes("voda") || textUdalosti.includes("vody") || textUdalosti.includes("strom") || textUdalosti.includes("technic")) ? "TECHNICKÝ VÝJAZD" : "POŽIAR";
        document.getElementById("typ").innerText = m.typ;
        document.getElementById("adresa").innerText = m.miesto || "";
        if (m.miesto) drawRoute(m.miesto);
        startTimer(m.timestamp);
    }

    Object.keys(d).forEach(k => {
        if (k === "__metadata") return;
        const div = document.createElement("div");
        div.className = "item " + (d[k] === "IDEM" ? "idem" : "nejdem");
        div.innerText = k;
        (d[k] === "IDEM" ? idemDiv : nejdemDiv).appendChild(div);
    });
});

async function drawRoute(miesto) {
    if (window.innerWidth <= 1024) return;
    try {
        const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(miesto + ", Slovensko")}`);
        const geo = await resp.json();
        if (geo.length > 0) {
            const ciel = [geo[0].lat, geo[0].lon];
            const routeResp = await fetch(`https://router.project-osrm.org/route/v1/driving/${hasicaren[1]},${hasicaren[0]};${ciel[1]},${ciel[0]}?overview=full&geometries=geojson`);
            const routeData = await routeResp.json();
            if(routeLayer) map.removeLayer(routeLayer);
            if(markerCiel) map.removeLayer(markerCiel);
            routeLayer = L.geoJSON(routeData.routes[0].geometry, { style: { color: '#ff1744', weight: 6 } }).addTo(map);
            markerCiel = L.marker(ciel).addTo(map).bindPopup("MIESTO ZÁSAHU");
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
        }
    } catch (e) {}
}

function startTimer(s) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const e = Math.floor((Date.now() - s) / 1000);
        document.getElementById("timer").innerText = `${Math.floor(e/60)}:${(e%60).toString().padStart(2,"0")}`;
        if (e >= 900) autoArchiveAndReset();
    }, 1000);
}

async function autoArchiveAndReset() {
    const docRef = db.collection("vyjazdy").doc("active");
    const doc = await docRef.get();
    if (doc.exists) {
        await db.collection("archiv").add({ ...doc.data(), uzavrete_timestamp: Date.now(), datum: new Date().toLocaleString("sk-SK") });
        await docRef.delete();
    }
}

async function manualReset() {
    if (prompt("Heslo (1122):") === "1122") autoArchiveAndReset();
    else alert("Chyba!");
}

setInterval(() => { document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK"); }, 1000);
window.onload = () => { initMap(); spracujVstup(); };
</script>
</body>
</html>
