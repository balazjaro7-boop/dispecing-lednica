<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHZ Lednica - DISPEČING</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
:root{
    --bg:#07090c;
    --panel:#10141a;
    --green:#00e676;
    --gray:#888;
    --red:#ff1744;
    --yellow:#ffeb3b;
}

*{box-sizing:border-box;}

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Segoe UI,sans-serif;
    background:var(--bg);
    color:#fff;
    overflow:hidden;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#000;
    border-bottom:2px solid #222;
}

.brand{
    font-size:1.3rem;
    font-weight:700;
    color:#aaa;
}

.center-timer{
    font-size:1.6rem;
    font-family:monospace;
    color:var(--yellow);
}

.right{
    display:flex;
    align-items:center;
    gap:10px;
}

.clock{
    font-family:monospace;
    font-size:1.8rem;
    font-weight:bold;
}

.reset{
    background:#222;
    color:#aaa;
    border:1px solid #333;
    padding:4px 10px;
    cursor:pointer;
    font-size:0.8rem;
}

/* BANNER */
#banner {
    display:none;
    padding:8px;
    text-align:center;
    animation: stroboskop 0.8s infinite;
}

@keyframes stroboskop {
    0% { background:#8b0000; color:#fff; }
    50% { background:#ffeb3b; color:#000; }
    100% { background:#8b0000; color:#fff; }
}

.event-type{
    font-size:1.4rem;
    font-weight:900;
    text-transform:uppercase;
}

.event-address{
    font-size:0.9rem;
    font-weight:bold;
}

/* MAIN */
.main{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    padding:10px;
    gap:15px;
}

.col{
    display:flex;
    flex-direction:column;
    background:var(--panel);
    border-radius:4px;
    padding:10px;
}

.title{
    text-align:center;
    font-size:1.8rem;
    font-weight:800;
    margin-bottom:10px;
    border-bottom:2px solid #222;
    padding-bottom:5px;
}

.list{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:5px;
    overflow-y:auto;
}

.item{
    padding:5px 10px;
    font-size:1.4rem;
    font-weight:bold;
    text-transform:uppercase;
}

.idem{ color:var(--green); background:rgba(0,230,118,0.08); }
.nejdem{ color:var(--gray); background:rgba(255,255,255,0.03); }

.footer{
    padding:10px;
    font-size:0.9rem;
    color:#444;
    background:#000;
    text-align:center;
}

/* 📱 MOBILE */
@media (max-width:768px){

    body{ overflow:auto; }

    .header{
        flex-direction:column;
        gap:5px;
        padding:8px;
    }

    .brand{ font-size:0.9rem; text-align:center; }
    .center-timer{ font-size:1.4rem; }
    .clock{ font-size:1.2rem; }

    /* banner menší */
    #banner{ padding:6px; }
    .event-type{ font-size:1rem; }
    .event-address{ font-size:0.8rem; }

    /* layout pod seba */
    .main{
        grid-template-columns:1fr;
        gap:10px;
        padding:8px;
    }

    .col:first-child{ order:1; } /* IDEM */
    .col:last-child{ order:2; }  /* NEJDEM */

    .title{ font-size:1.3rem; }

    .list{ grid-template-columns:1fr; }

    .item{
        font-size:1.1rem;
        padding:7px;
    }

    .footer{ font-size:0.8rem; }
}
</style>
</head>

<body>

<div class="header">
    <div class="brand">DHZ LEDNICA DISPEČING</div>
    <div id="timer" class="center-timer">--:--</div>
    <div class="right">
        <div id="clock" class="clock">00:00:00</div>
        <button class="reset" onclick="manualReset()">RESET</button>
    </div>
</div>

<div id="banner">
    <div id="typ" class="event-type"></div>
    <div id="adresa" class="event-address"></div>
</div>

<div class="main">
    <div class="col">
        <div class="title" style="color:var(--green);">IDEM</div>
        <div id="idem" class="list"></div>
    </div>

    <div class="col">
        <div class="title" style="color:var(--gray);">NEJDEM</div>
        <div id="nejdem" class="list"></div>
    </div>
</div>

<div class="footer" onclick="window.location.href='archiv.html'">
    📂 ARCHÍV VÝJAZDOV
</div>

<script>
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let timerInterval;

setInterval(()=>{
    document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK");
},1000);

db.collection("vyjazdy").doc("active").onSnapshot(doc=>{
    const idem=document.getElementById("idem");
    const nejdem=document.getElementById("nejdem");
    const banner=document.getElementById("banner");

    idem.innerHTML="";
    nejdem.innerHTML="";

    if(!doc.exists){
        banner.style.display="none";
        return;
    }

    const d=doc.data();
    const m=d.__metadata||{};

    if(m.typ){
        banner.style.display="block";
        document.getElementById("typ").innerText=m.typ;
        document.getElementById("adresa").innerText=m.miesto||"";
    }

    Object.keys(d).forEach(k=>{
        if(k==="__metadata") return;
        const div=document.createElement("div");
        div.className="item";
        div.innerText=k;
        if(d[k]==="IDEM"){
            div.classList.add("idem");
            idem.appendChild(div);
        }else{
            div.classList.add("nejdem");
            nejdem.appendChild(div);
        }
    });
});
</script>

</body>
</html>
