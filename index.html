<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHZ LEDNICA - DISPEČING</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #1a1a1a; color: white; margin: 0; text-align: center; }
        .header { background-color: #d32f2f; padding: 20px; font-size: 28px; font-weight: bold; border-bottom: 5px solid #b71c1c; }
        .info-box { background-color: #333; padding: 15px; margin: 10px; border: 2px dashed #ffeb3b; color: #ffeb3b; font-size: 22px; text-transform: uppercase; }
        .container { display: flex; justify-content: space-around; padding: 20px; flex-wrap: wrap; }
        .column { background-color: #000; border: 2px solid #333; border-radius: 10px; width: 45%; min-height: 450px; padding: 10px; }
        .idem-header { border: 2px solid #4caf50; color: #4caf50; padding: 10px; }
        .nejdem-header { border: 2px solid #f44336; color: #f44336; padding: 10px; }
        .name-box { padding: 15px; margin: 10px 0; border-radius: 5px; font-size: 24px; font-weight: bold; text-transform: uppercase; }
        .bg-green { background-color: #2e7d32; border-left: 10px solid #1b5e20; }
        .bg-red { background-color: #c62828; border-left: 10px solid #b71c1c; }
        .nav-link { color: #888; text-decoration: none; font-size: 14px; display: block; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">🚒 DHZ LEDNICA - LIVE DISPEČING</div>
<div id="vyjazd-info" class="info-box" style="display:none;"></div>

<div class="container">
    <div class="column">
        <h2 class="idem-header">🟢 IDEM</h2>
        <div id="list-idem"></div>
    </div>
    <div class="column">
        <h2 class="nejdem-header">🔴 NEJDEM</h2>
        <div id="list-nejdem"></div>
    </div>
</div>

<a href="archiv.html" class="nav-link">Kniha výjazdov (Archív)</a>

<script>
    // TU PONECHAJ SVOJU KONFIGURÁCIU
    const firebaseConfig = {
        apiKey: "TVOJ_API_KEY",
        authDomain: "hasici-lednica.firebaseapp.com",
        projectId: "hasici-lednica",
        storageBucket: "hasici-lednica.appspot.com",
        messagingSenderId: "747340639310",
        appId: "TVOJE_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("vyjazdy").doc("active");

    // FUNKCIA NA ARCHIVÁCIU A RESET
    async function archiveAndReset(data) {
        const huraIdem = [];
        const smolaNejdem = [];
        
        for (const [meno, stav] of Object.entries(data)) {
            if (meno !== 'lastUpdate' && meno !== 'infoText') {
                if (stav === "IDEM") huraIdem.push(meno);
                if (stav === "NEMÔŽEM" || stav === "NEJDEM") smolaNejdem.push(meno);
            }
        }

        if (huraIdem.length > 0 || smolaNejdem.length > 0) {
            await db.collection("archiv").add({
                datum: firebase.firestore.FieldValue.serverTimestamp(),
                info: data.infoText || "Nezadaný typ výjazdu",
                isli: huraIdem,
                nejdli: smolaNejdem
            });
        }

        const updates = { infoText: "" };
        Object.keys(data).forEach(key => {
            if (key !== 'lastUpdate' && key !== 'infoText') updates[key] = "NEZADANÉ";
        });
        await docRef.update(updates);
    }

    // SPRACOVANIE ADRESY (meno, akcia, info)
    const params = new URLSearchParams(window.location.search);
    const meno = params.get('meno');
    const akcia = params.get('akcia');
    const info = params.get('info');

    if (meno || info) {
        let up = { lastUpdate: firebase.firestore.FieldValue.serverTimestamp() };
        if (meno && akcia) up[meno] = akcia;
        if (info) up.infoText = info.replace(/_/g, ' ');
        
        docRef.update(up).then(() => {
            window.history.replaceState({}, document.title, "/");
        });
    }

    // REÁLNY ČAS
    docRef.onSnapshot((doc) => {
        const data = doc.data();
        if (!data) return;

        const infoDiv = document.getElementById("vyjazd-info");
        if (data.infoText) {
            infoDiv.innerText = "AKTUÁLNY VÝJAZD: " + data.infoText;
            infoDiv.style.display = "block";
        } else {
            infoDiv.style.display = "none";
        }

        const lI = document.getElementById("list-idem");
        const lN = document.getElementById("list-nejdem");
        lI.innerHTML = ""; lN.innerHTML = "";

        if (data.lastUpdate) {
            const last = data.lastUpdate.toDate().getTime();
            if (new Date().getTime() - last > 1800000) { // 30 min
                archiveAndReset(data);
                return;
            }
        }

        for (const [m, s] of Object.entries(data)) {
            if (m === 'lastUpdate' || m === 'infoText') continue;
            if (s === "IDEM") lI.innerHTML += `<div class="name-box bg-green">${m}</div>`;
            else if (s === "NEMÔŽEM" || s === "NEJDEM" || s === "NEJDE") lN.innerHTML += `<div class="name-box bg-red">${m}</div>`;
        }
    });
</script>
</body>
</html>
