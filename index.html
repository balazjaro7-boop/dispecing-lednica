<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHZ Lednica - DISPEČING</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
:root{
    --bg:#07090c;
    --panel:#10141a;
    --green:#00e676;
    --gray:#888;
    --red:#ff1744;
    --yellow:#ffeb3b;
}

*{box-sizing:border-box;}

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Segoe UI,sans-serif;
    background:var(--bg);
    color:#fff;
    overflow:hidden;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#000;
    border-bottom:2px solid #222;
    flex:0 0 auto;
}

.brand{
    font-size:1.3rem;
    font-weight:700;
    color:#aaa;
}

.center-timer{
    font-size:1.6rem;
    font-family:monospace;
    color:var(--yellow);
}

.right{
    display:flex;
    align-items:center;
    gap:10px;
}

.clock{
    font-family:monospace;
    font-size:1.8rem;
    font-weight:bold;
}

.reset{
    background:#222;
    color:#aaa;
    border:1px solid #333;
    padding:4px 10px;
    cursor:pointer;
    font-size:0.8rem;
}

/* BANNER PC */
#banner {
    display: none;
    flex: 0 0 auto;
    padding: 8px;
    text-align: center;
    animation: stroboskop 0.8s infinite;
}

@keyframes stroboskop {
    0% { background:#8b0000; color:#fff; }
    50% { background:#ffeb3b; color:#000; }
    100% { background:#8b0000; color:#fff; }
}

.event-type{
    font-size:1.4rem;
    font-weight:900;
    text-transform:uppercase;
}

.event-address{
    font-size:0.9rem;
    font-weight:bold;
    margin-top:2px;
}

/* MAIN */
.main{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
    padding:10px;
    gap:15px;
}

.col{
    display:flex;
    flex-direction:column;
    overflow:hidden;
    background:var(--panel);
    border-radius:4px;
    padding:10px;
}

.title{
    text-align:center;
    font-size:1.8rem;
    font-weight:800;
    margin-bottom:10px;
    border-bottom:2px solid #222;
    padding-bottom:5px;
}

.list{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:5px;
    overflow-y:auto;
}

.item{
    padding:5px 10px;
    font-size:1.4rem;
    font-weight:bold;
    text-transform:uppercase;
}

.idem{ color:var(--green); background:rgba(0,230,118,0.08); }
.nejdem{ color:var(--gray); background:rgba(255,255,255,0.03); }

.footer{
    flex:0 0 auto;
    padding:10px 15px;
    font-size:0.9rem;
    color:#444;
    background:#000;
    border-top:1px solid #111;
    text-align:center;
}

/* ================================= */
/* 📱 MOBILNÁ OPRAVA - TOTÁLNY FIX  */
/* ================================= */

@media (max-width: 768px){
    /* Hlavička do stĺpca, aby sa časy neprekrývali */
    .header{ 
        flex-direction: row; 
        flex-wrap: wrap; 
        padding: 5px 10px; 
        justify-content: space-around;
    }
    .brand{ font-size: 0.7rem; width: 100%; text-align: center; margin-bottom: 2px; }
    .center-timer{ font-size: 1.1rem; order: 1; }
    .right{ order: 2; gap: 5px; }
    .clock{ font-size: 1.1rem; }
    .reset{ font-size: 0.6rem; padding: 2px 5px; }

    /* BANNER - EXTRA MINI */
    #banner { padding: 4px; }
    .event-type{ font-size: 0.9rem; line-height: 1; }
    .event-address{ font-size: 0.7rem; margin-top: 1px; }

    .main{ padding: 5px; gap: 5px; }
    .col{ padding: 5px; }
    .title{ font-size: 0.8rem; margin-bottom: 4px; padding-bottom: 2px; }

    /* MENÁ - MINI V 2 STĹPCOCH */
    .list{ grid-template-columns: 1fr 1fr; gap: 3px; }
    .item{ 
        font-size: 0.65rem; 
        padding: 3px 5px; 
        line-height: 1; 
        border-radius: 2px;
    }
    .footer{ font-size: 0.7rem; padding: 5px; }
}
</style>
</head>

<body>

<div class="header">
    <div class="brand">DHZ LEDNICA DISPEČING</div>
    <div id="timer" class="center-timer">--:--</div>
    <div class="right">
        <div id="clock" class="clock">00:00:00</div>
        <button class="reset" onclick="manualReset()">RESET</button>
    </div>
</div>

<div id="banner">
    <div id="typ" class="event-type"></div>
    <div id="adresa" class="event-address"></div>
</div>

<div class="main">
    <div class="col">
        <div class="title" style="color:var(--green);">IDEM</div>
        <div id="idem" class="list"></div>
    </div>

    <div class="col">
        <div class="title" style="color:var(--gray);">NEJDEM</div>
        <div id="nejdem" class="list"></div>
    </div>
</div>

<div class="footer" onclick="window.location.href='archiv.html'">
    📂 ARCHÍV VÝJAZDOV
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let timerInterval;

setInterval(()=>{
    document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK");
},1000);

async function spracujVstup(){
    const params=new URLSearchParams(window.location.search);
    const u=params.get('udalost');
    const a=params.get('akcia');

    if(u){
        let typ=u, adr="";
        if(u.toLowerCase().includes("adresa:")){
            const p=u.split(/adresa:/i);
            typ=p[0].trim();
            adr=p[1].trim();
        }
        await db.collection("vyjazdy").doc("active").set({
            __metadata:{typ:typ, miesto:adr, timestamp:Date.now()}
        },{merge:true});
        window.history.replaceState({},'','/');
    }

    if(a){
        let meno=localStorage.getItem('h_meno')||prompt("Zadaj meno:");
        if(meno){
            localStorage.setItem('h_meno',meno);
            await db.collection("vyjazdy").doc("active").set({[meno]:a},{merge:true});
        }
        window.history.replaceState({},'','/');
    }
}

db.collection("vyjazdy").doc("active").onSnapshot(doc=>{
    const idem=document.getElementById("idem");
    const nejdem=document.getElementById("nejdem");
    const banner=document.getElementById("banner");

    idem.innerHTML="";
    nejdem.innerHTML="";

    if(!doc.exists){
        banner.style.display="none";
        document.getElementById("timer").innerText="--:--";
        if(timerInterval) clearInterval(timerInterval);
        return;
    }

    const d=doc.data();
    const m=d.__metadata||{};

    if(m.typ){
        banner.style.display="block";
        document.getElementById("typ").innerText=m.typ;
        document.getElementById("adresa").innerText=m.miesto||"";
        if(m.timestamp) startTimer(m.timestamp);
    } else {
        banner.style.display="none";
    }

    Object.keys(d).forEach(k=>{
        if(k==="__metadata") return;
        const div=document.createElement("div");
        div.className="item";
        div.innerText=k;
        if(d[k]==="IDEM"){
            div.classList.add("idem");
            idem.appendChild(div);
        }else{
            div.classList.add("nejdem");
            nejdem.appendChild(div);
        }
    });
});

function startTimer(start){
    if(timerInterval) clearInterval(timerInterval);
    timerInterval=setInterval(async()=>{
        const left=1800-Math.floor((Date.now()-start)/1000);
        if(left<=0){
            clearInterval(timerInterval);
            await autoReset();
            return;
        }
        const m=Math.floor(left/60);
        const s=left%60;
        document.getElementById("timer").innerText=`${m}:${s.toString().padStart(2,"0")}`;
    },1000);
}

async function manualReset(){
    if(confirm("RESET + ARCHÍV?")){
        await autoReset();
    }
}

async function autoReset(){
    const ref=db.collection("vyjazdy").doc("active");
    const snap=await ref.get();
    if(snap.exists){
        const d=snap.data();
        const m=d.__metadata||{};
        const ide=[],nej=[];
        Object.keys(d).forEach(k=>{
            if(k!=="__metadata") (d[k]==="IDEM"?ide:nej).push(k);
        });
        if(m.typ){
            await db.collection("archiv").add({
                datum:firebase.firestore.Timestamp.now(),
                info:m.typ+(m.miesto?" ("+m.miesto+")":""),
                isli:ide,
                nejdli:nej
            });
        }
        await ref.delete();
    }
}

window.onload=spracujVstup;
</script>

</body>
</html>
