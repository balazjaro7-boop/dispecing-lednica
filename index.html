<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHZ LEDNICA - DISPEČING</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
      margin: 0;
      padding-bottom: 50px;
    }

    h1 {
      background: #d32f2f;
      padding: 20px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .status-info {
      background: #333;
      padding: 10px;
      font-style: italic;
      color: #ccc;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .box {
      width: 45%;
      min-width: 300px;
      margin: 10px;
      padding: 15px;
      background: #1c1c1c;
      border-radius: 15px;
      border: 1px solid #333;
    }

    h2 {
      border-bottom: 2px solid #444;
      padding-bottom: 10px;
    }

    .person {
      font-size: 22px;
      font-weight: bold;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .ok { background: #1b5e20; border-left: 10px solid #4caf50; }
    .no { background: #b71c1c; border-left: 10px solid #f44336; }

    button {
      margin-top: 10px;
      padding: 12px 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .btn-ide { background: #4caf50; color: white; }
    .btn-neide { background: #f44336; color: white; }
    button:hover { opacity: 0.8; transform: scale(1.05); }

    #auto-msg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #28a745;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      display: none;
      z-index: 1000;
    }
  </style>
</head>

<body>

<div id="auto-msg">NAHLASUJEM ÚČASŤ...</div>

<h1>🚒 DHZ LEDNICA - LIVE DISPEČING</h1>
<div class="status-info">Aktuálny stav výjazdu v reálnom čase</div>

<div class="container">
  <div class="box">
    <h2 style="color: #4caf50;">🟢 IDEM</h2>
    <div id="ide"></div>
  </div>

  <div class="box">
    <h2 style="color: #f44336;">🔴 NEJDEM</h2>
    <div id="neide"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEs_jevah2vq-zOLhNbvaoQ37fupAKlBg",
  authDomain: "dhz-lednica.firebaseapp.com",
  projectId: "dhz-lednica",
  storageBucket: "dhz-lednica.firebasestorage.app",
  messagingSenderId: "486037163441",
  appId: "1:486037163441:web:1fce766ed28ea953a2c190"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "vyjazdy", "active");

const ideContainer = document.getElementById("ide");
const neideContainer = document.getElementById("neide");
const autoMsg = document.getElementById("auto-msg");

// --- FUNKCIA PRE AUTOMATICKÝ ZÁPIS Z PUSHOVERU ---
async function checkUrlParams() {
    const urlParams = new URLSearchParams(window.location.search);
    const pMeno = urlParams.get('meno');
    const pAkcia = urlParams.get('akcia');

    if (pMeno && pAkcia) {
        autoMsg.style.display = "block";
        autoMsg.innerText = `NAHLASUJEM: ${pMeno} -> ${pAkcia}...`;
        
        try {
            await updateDoc(ref, {
                [`hasici.${pMeno}`]: pAkcia
            });
            autoMsg.style.background = "#28a745";
            autoMsg.innerText = `ROZKAZ! ${pMeno}, TVOJA ÚČASŤ (${pAkcia}) BOLA ZAPÍSANÁ.`;
            
            // Po 3 sekundách správa zmizne a vyčistí URL adresu
            setTimeout(() => {
                autoMsg.style.display = "none";
                window.history.replaceState({}, document.title, window.location.pathname);
            }, 3000);
        } catch (e) {
            autoMsg.style.background = "red";
            autoMsg.innerText = "CHYBA PRI ZÁPISE!";
            console.error(e);
        }
    }
}

// --- LIVE AKTUALIZÁCIA DISPEČINGU ---
onSnapshot(ref, (snap) => {
    if (!snap.exists()) return;
    
    const data = snap.data();
    const h = data.hasici || {};

    ideContainer.innerHTML = "";
    neideContainer.innerHTML = "";

    // Zoradenie mien podľa abecedy
    const zoradeneMena = Object.keys(h).sort();

    zoradeneMena.forEach(meno => {
        const stav = h[meno];
        const div = document.createElement("div");
        div.className = "person " + (stav === "IDEM" ? "ok" : "no");
        div.innerHTML = `<span>${meno}</span>`;

        const btn = document.createElement("button");
        btn.className = stav === "IDEM" ? "btn-neide" : "btn-ide";
        btn.innerText = stav === "IDEM" ? "ZMENIŤ NA: NEJDEM" : "ZMENIŤ NA: IDEM";

        btn.onclick = async () => {
            await updateDoc(ref, {
                [`hasici.${meno}`]: stav === "IDEM" ? "NEJDEM" : "IDEM"
            });
        };

        div.appendChild(btn);

        if (stav === "IDEM") {
            ideContainer.appendChild(div);
        } else {
            neideContainer.appendChild(div);
        }
    });
});

// Spustíme kontrolu parametrov pri načítaní
checkUrlParams();

</script>

</body>
</html>
