<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHZ Lednica - Live Dispečing</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .header { background-color: #b71c1c; padding: 15px; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 2em; text-transform: uppercase; }
        .status-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .hasic-card { width: 220px; padding: 20px; border-radius: 10px; font-size: 1.4em; font-weight: bold; border: 3px solid #333; transition: 0.3s; }
        
        /* Farby stavov */
        .stav-IDEM { background-color: #2e7d32; border-color: #4caf50; box-shadow: 0 0 15px rgba(76,175,80,0.4); }
        .stav-NEMOZEM { background-color: #c62828; border-color: #f44336; }
        .stav-NEZADANE { background-color: #222; color: #666; border-color: #333; }
        
        .sub-text { font-size: 0.6em; display: block; margin-top: 5px; opacity: 0.8; }
        .loading { color: #ffeb3b; font-size: 1.2em; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚒 DHZ LEDNICA</h1>
        <div style="font-size: 0.9em; margin-top: 5px;">LIVE DISPEČING</div>
    </div>

    <div id="loading" class="loading">Nahrávam stav jednotky...</div>
    <div id="dispecing" class="status-container"></div>

    <script>
        // TVOJA KONFIGURÁCIA KTORÚ SI MI POSLAL
        const firebaseConfig = {
            apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
            authDomain: "hasici-lednica.firebaseapp.com",
            projectId: "hasici-lednica",
            storageBucket: "hasici-lednica.firebasestorage.app",
            messagingSenderId: "747340639310",
            appId: "1:747340639310:web:e6cba7417ffae4ed59e71f"
        };

        // Inicializácia Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Funkcia na spracovanie akcie z Pushoveru
        async function spracujVstup() {
            const urlParams = new URLSearchParams(window.location.search);
            const akcia = urlParams.get('akcia');

            if (akcia) {
                // Skúsime vytiahnuť meno z pamäte tohto mobilu
                let meno = localStorage.getItem('mojeMeno_DHZ');

                if (!meno) {
                    // Ak mobil nemá meno, vypýtame si ho (iba raz)
                    meno = prompt("Tento mobil ešte nie je priradený. Napíš svoje meno a priezvisko (napr. Jano Mrkva):");
                    if (meno) {
                        localStorage.setItem('mojeMeno_DHZ', meno);
                    } else {
                        return; // Ak zruší, nič sa nezapíše
                    }
                }

                // Zápis do databázy - použijeme "merge", aby sme neprepísali ostatných
                try {
                    await db.collection("vyjazdy").doc("active").set({
                        [meno]: akcia
                    }, { merge: true });
                    
                    // Vyčistíme URL, aby pri refreshi neposielalo akciu znova
                    window.history.replaceState({}, document.title, "/");
                } catch (e) {
                    console.error("Chyba:", e);
                }
            }
        }

        // Sledovanie zmien v databáze v reálnom čase
        function sledovatStav() {
            db.collection("vyjazdy").doc("active").onSnapshot((doc) => {
                const container = document.getElementById('dispecing');
                const loading = document.getElementById('loading');
                
                if (doc.exists) {
                    loading.style.display = 'none';
                    container.innerHTML = '';
                    const data = doc.data();

                    // Vykreslenie hasičov (zoradených podľa mena)
                    Object.keys(data).sort().forEach(meno => {
                        const stav = data[meno];
                        const card = document.createElement('div');
                        card.className = `hasic-card stav-${stav}`;
                        
                        let textPopis = "ČAKÁ";
                        if(stav === 'IDEM') textPopis = "PRICHÁDZA";
                        if(stav === 'NEMOZEM') textPopis = "NEDOSTUPNÝ";

                        card.innerHTML = `${meno} <span class="sub-text">${textPopis}</span>`;
                        container.appendChild(card);
                    });
                }
            });
        }

        // Spustenie pri načítaní
        window.onload = () => {
            spracujVstup();
            sledovatStav();
        };
    </script>
</body>
</html>
