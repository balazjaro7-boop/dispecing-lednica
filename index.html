<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHZ Lednica - Operačné Stredisko</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #161616;
            --accent-red: #cc0000;
            --accent-green: #2e7d32;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Impact, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px; background: #000; border-bottom: 3px solid var(--accent-red);
        }

        .brand { font-size: 1.8em; font-weight: bold; }
        .clock-container { display: flex; align-items: center; gap: 30px; }
        
        .clock { 
            font-size: 3em; 
            font-family: 'Courier New', monospace; 
            color: #ffffff; 
            font-weight: bold;
        }
        
        .btn-reset {
            background: #333; color: #777; border: 1px solid #444;
            padding: 8px 15px; cursor: pointer; border-radius: 4px; font-size: 0.7em;
            text-transform: uppercase;
        }
        .btn-reset:hover { background: #d32f2f; color: #fff; }

        .event-banner {
            background-color: var(--accent-red); color: white;
            padding: 20px 0; text-align: center;
            font-size: 4.5em; font-weight: 900; text-transform: uppercase;
            min-height: 1.2em; box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }

        .timer-line {
            background: #222; text-align: center; padding: 10px;
            font-size: 1.8em; color: #ffeb3b; border-bottom: 1px solid #333;
        }

        .main-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 15px; flex-grow: 1;
        }

        .column {
            background: var(--panel-color); border: 1px solid #222;
            border-radius: 5px; display: flex; flex-direction: column;
        }

        .column-header {
            text-align: center; font-size: 3em; padding: 15px;
            background: rgba(255,255,255,0.03); border-bottom: 2px solid #222;
            font-weight: bold;
        }

        .list-container { padding: 15px; overflow-y: auto; }

        .hasic-card {
            padding: 20px; margin-bottom: 15px; border-radius: 10px;
            font-size: 2.5em; font-weight: bold; text-align: center;
            text-transform: uppercase; animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .idem-card { background-color: var(--accent-green); border-left: 20px solid #1b5e20; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); }
        .nejdem-card { background-color: #333; color: #666; border-left: 20px solid #222; }

        .bottom-bar {
            height: 70px; background: #000; display: flex;
            justify-content: space-between; align-items: center;
            padding: 0 25px; border-top: 2px solid #222;
        }

        .link-archiv { color: #555; text-decoration: none; font-size: 1.2em; font-weight: bold; }
        .link-archiv:hover { color: var(--accent-red); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">DHZ LEDNICA - DISPEČING</div>
        <div class="clock-container">
            <button class="btn-reset" onclick="manualnyReset()">VYMAZAŤ / RESET</button>
            <div id="live-clock" class="clock">00:00:00</div>
        </div>
    </div>

    <div id="event-line" class="event-banner">--- ČAKÁM NA VÝZVU ---</div>

    <div class="timer-line">
        RESTART O: <span id="countdown">30:00</span>
    </div>

    <div class="main-grid">
        <div class="column">
            <div class="column-header" style="color: #4caf50;">IDEM</div>
            <div id="list-idem" class="list-container"></div>
        </div>
        <div class="column">
            <div class="column-header" style="color: #f44336;">NEJDEM</div>
            <div id="list-nejdem" class="list-container"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <a href="archiv.html" class="link-archiv">📂 ARCHÍV VÝJAZDOV</a>
        <div style="color: #222;">SYSTEM v2.6</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
            authDomain: "hasici-lednica.firebaseapp.com",
            projectId: "hasici-lednica",
            storageBucket: "hasici-lednica.firebasestorage.app",
            messagingSenderId: "747340639310",
            appId: "1:747340639310:web:e6cba7417ffae4ed59e71f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Biele veľké hodiny
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0') + ":" + 
                now.getSeconds().toString().padStart(2, '0');
        }, 1000);

        async function spracujVstup() {
            const params = new URLSearchParams(window.location.search);
            const akcia = params.get('akcia');
            const udalost = params.get('udalost');

            if (udalost) {
                // Zapíšeme novú udalosť a aktuálny čas (štart odpočtu)
                await db.collection("vyjazdy").doc("active").set({
                    __metadata: { 
                        typ: udalost, 
                        timestamp: Date.now() 
                    }
                }, { merge: true });
                // Vyčistíme URL
                window.history.replaceState({}, document.title, "/");
            }

            if (akcia) {
                let meno = localStorage.getItem('mojeMeno_DHZ');
                if (!meno) {
                    meno = prompt("Zadaj svoje meno pre dispečing:");
                    if (meno) localStorage.setItem('mojeMeno_DHZ', meno);
                    else return;
                }
                await db.collection("vyjazdy").doc("active").set({ [meno]: akcia }, { merge: true });
                window.history.replaceState({}, document.title, "/");
            }
        }

        let timerInterval;
        function sledovatStav() {
            db.collection("vyjazdy").doc("active").onSnapshot(async (doc) => {
                const listIdem = document.getElementById('list-idem');
                const listNejdem = document.getElementById('list-nejdem');
                const eventLine = document.getElementById('event-line');
                const countdownBox = document.getElementById('countdown');
                
                if (!doc.exists) {
                    listIdem.innerHTML = ''; listNejdem.innerHTML = '';
                    eventLine.innerText = "--- ČAKÁM NA VÝZVU ---";
                    countdownBox.innerText = "30:00";
                    if(timerInterval) clearInterval(timerInterval);
                    return;
                }
                
                const data = doc.data();
                const meta = data.__metadata || {};
                
                // Zobrazíme typ udalosti (napr. Technický zásah)
                eventLine.innerText = meta.typ || "--- ČAKÁM NA VÝZVU ---";

                if (meta.timestamp) {
                    startTimer(meta.timestamp);
                }

                listIdem.innerHTML = ''; listNejdem.innerHTML = '';
                Object.keys(data).sort().forEach(meno => {
                    if (meno === '__metadata') return;
                    const stav = data[meno];
                    const card = document.createElement('div');
                    card.className = `hasic-card ${stav === 'IDEM' ? 'idem-card' : 'nejdem-card'}`;
                    card.innerText = meno;
                    if (stav === 'IDEM') listIdem.appendChild(card);
                    else listNejdem.appendChild(card);
                });
            });
        }

        function startTimer(startTime) {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(async () => {
                const zostava = 1800 - Math.floor((Date.now() - startTime) / 1000);
                const countdownBox = document.getElementById('countdown');
                
                if (zostava <= 0) {
                    clearInterval(timerInterval);
                    await archivovatAResetovat();
                } else {
                    const m = Math.floor(zostava / 60);
                    const s = zostava % 60;
                    countdownBox.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }

        async function manualnyReset() {
            if(confirm("Ukončiť výjazd a uložiť do archívu?")) {
                await archivovatAResetovat();
            }
        }

        async function archivovatAResetovat() {
            const docRef = db.collection("vyjazdy").doc("active");
            const snapshot = await docRef.get();
            if (snapshot.exists) {
                const data = snapshot.data();
                const meta = data.__metadata || {};
                const isli = []; const nejdli = [];
                Object.keys(data).forEach(m => {
                    if(m !== '__metadata') {
                        if(data[m] === 'IDEM') isli.push(m); else nejdli.push(m);
                    }
                });
                if (meta.typ) {
                    await db.collection("archiv").add({
                        datum: firebase.firestore.Timestamp.now(),
                        info: meta.typ,
                        isli: isli, nejdli: nejdli
                    });
                }
                await docRef.delete();
            }
        }

        window.onload = () => { spracujVstup(); sledovatStav(); };
    </script>
</body>
</html>
