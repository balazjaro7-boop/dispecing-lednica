<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHZ Lednica - DISPEČING</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root{ --bg:#07090c; --panel:#10141a; --green:#00e676; --gray:#888; --red:#ff1744; --yellow:#ffeb3b; --blue:#2196f3; }
        body{ margin:0; height:100vh; display:flex; flex-direction:column; font-family:Segoe UI,sans-serif; background:var(--bg); color:#fff; overflow:hidden; }
        
        /* HEADER - Absolútne vycentrovanie času */
        .header{ display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; padding:10px 20px; background:#000; border-bottom:2px solid #222; flex:0 0 auto; }
        .brand{ font-size:1.1rem; font-weight:700; color:#aaa; }
        .timer-container{ display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 300px; }
        .timer-label{ font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .center-timer{ font-size:2.8rem; font-family:monospace; color:var(--yellow); font-weight: bold; line-height: 1; margin-top: 5px; }
        .controls{ display:flex; align-items:center; gap:10px; justify-content: flex-end; }
        .clock{ font-family:monospace; font-size:1.6rem; font-weight:bold; margin-right: 10px; }
        
        .btn-top { padding:6px 12px; cursor:pointer; font-size:0.8rem; border-radius:3px; border:1px solid #333; font-weight: bold; text-transform: uppercase; text-decoration: none; color:inherit; }
        .reset{ background:#222; color:var(--red); }
        .archive-btn{ background:#222; color:var(--blue); }
        
        #banner { display:none; flex:0 0 auto; padding:8px; text-align:center; animation:stroboskop 0.8s infinite; border-bottom:2px solid #000; }
        @keyframes stroboskop { 0% { background:#8b0000; color:#fff; } 50% { background:#ffeb3b; color:#000; } 100% { background:#8b0000; color:#fff; } }
        
        /* ROZLOŽENIE PANELOV PRE PC/TV */
        .main{ flex:1; display:grid; grid-template-columns: 320px 1fr 320px; overflow:hidden; padding:10px; gap:15px; }
        .map-container { background: var(--panel); border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #222; }
        #map-frame { width: 100%; height: 100%; border: none; display: none; }
        .map-placeholder { font-size: 1.2rem; color: #333; text-align: center; font-weight: bold; }

        .col{ display:flex; flex-direction:column; background:var(--panel); border-radius:4px; padding:10px; overflow:hidden; }
        .title{ text-align:center; font-size:1.8rem; font-weight:800; border-bottom:2px solid #222; padding-bottom:5px; margin-bottom:10px; }
        .list{ display:flex; flex-direction:column; gap:8px; overflow-y:auto; }
        .item{ padding:8px 12px; font-size:1.4rem; font-weight:bold; text-transform:uppercase; border-radius:3px; border-left: 5px solid transparent; }
        .idem{ color:var(--green); background:rgba(0,230,118,0.1); border-left-color: var(--green); }
        .nejdem{ color:var(--gray); background:rgba(255,255,255,0.05); border-left-color: var(--gray); }

        /* MOBILNÁ VERZIA - 2 stĺpce, bez mapy */
        @media (max-width: 1024px){
            .header { grid-template-columns: 1fr; gap: 10px; padding: 10px; text-align: center; }
            .brand { display: none; }
            .controls { justify-content: center; }
            .main { grid-template-columns: 1fr 1fr; }
            .map-container { display: none !important; }
            .center-timer { font-size: 2.2rem; }
            .timer-container { min-width: auto; }
        }
        @media (max-width: 600px){
            .main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">DHZ LEDNICA</div>
    <div class="timer-container">
        <div id="timer-label" class="timer-label" style="visibility: hidden;">ČAS OD VYHLÁSENIA UDALOSTI</div>
        <div id="timer" class="center-timer">--:--</div>
    </div>
    <div class="controls">
        <div id="clock" class="clock">00:00:00</div>
        <a href="archiv.html" class="btn-top archive-btn">ARCHÍV</a>
        <button class="btn-top reset" onclick="manualReset()">RESET</button>
    </div>
</div>

<div id="banner">
    <div id="typ" style="font-size:1.8rem; font-weight:900; text-transform:uppercase;"></div>
    <div id="adresa" style="font-weight:bold; font-size:1.2rem;"></div>
</div>

<div class="main">
    <div class="col">
        <div class="title" style="color:var(--green);">IDEM</div>
        <div id="idem" class="list"></div>
    </div>

    <div class="map-container">
        <div id="map-msg" class="map-placeholder">DISPEČING PRIPRAVENÝ</div>
        <iframe id="map-frame" src=""></iframe>
    </div>

    <div class="col">
        <div class="title" style="color:var(--gray);">NEJDEM</div>
        <div id="nejdem" class="list"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let timerInterval;
const AUTO_RESET_MINUTES = 30;
const ZBROJNICA = "Lednica 243, 020 63 Lednica";

// Hodiny v rohu
setInterval(() => { 
    document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK"); 
}, 1000);

async function spracujVstup() {
    const params = new URLSearchParams(window.location.search);
    const u = params.get('udalost'); 
    const adr = params.get('miesto');
    const akc = params.get('akcia');
    const t = params.get('typ'); 

    const ref = db.collection("vyjazdy").doc("active");

    if (u) {
        await ref.set({ __metadata: { typ: u, miesto: adr || "", timestamp: Date.now() } }, { merge: true });
        sendPushover(u, adr, t);
        window.history.replaceState({}, '', window.location.pathname);
    }

    if (akc) {
        let meno = localStorage.getItem('h_meno') || prompt("Zadaj svoje meno:");
        if (meno) {
            localStorage.setItem('h_meno', meno);
            await ref.set({ [meno]: akc }, { merge: true });
        }
        window.history.replaceState({}, '', window.location.pathname);
    }
}

function sendPushover(udalost, miesto, skupinaTyp) {
    const apiToken = "arrtgeqpd5uczfjk1x918fgziguqp9";
    const groupVyjazd = (skupinaTyp === "AED") ? "gzv839iw4b249tqay7jicqzaw53w42" : "g796q69yjbfy1v2e2kc5enwqn57j1x";
    const baseUrl = "https://hasici-lednica.web.app/index.html";
    const msg = `<b>UDALOSŤ:</b> ${udalost}\n<b>MIESTO:</b> ${miesto || "Nezadané"}\n\n<a href="${baseUrl}?akcia=IDEM">✅ IDEM</a>\n<a href="${baseUrl}?akcia=NEJDEM">❌ NEJDEM</a>`;
    const mapsUrl = miesto ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(miesto)}` : baseUrl;

    fetch("https://api.pushover.net/1/messages.json", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
            token: apiToken, user: groupVyjazd, message: msg,
            title: "🚨 DHZ LEDNICA", priority: 2, retry: 60, expire: 3600, sound: "siren", html: 1,
            url: mapsUrl, url_title: "📍 OTVORIŤ MAPU"
        })
    });
}

db.collection("vyjazdy").doc("active").onSnapshot(doc => {
    const idemDiv = document.getElementById("idem");
    const nejdemDiv = document.getElementById("nejdem");
    const banner = document.getElementById("banner");
    const mapFrame = document.getElementById("map-frame");
    const mapMsg = document.getElementById("map-msg");
    const timerLabel = document.getElementById("timer-label");
    
    idemDiv.innerHTML = ""; nejdemDiv.innerHTML = "";

    if (!doc.exists) {
        banner.style.display = "none";
        mapFrame.style.display = "none";
        mapMsg.style.display = "block";
        timerLabel.style.visibility = "hidden";
        document.getElementById("timer").innerText = "--:--";
        if(timerInterval) clearInterval(timerInterval);
        return;
    }

    const d = doc.data();
    const m = d.__metadata || {};

    if (m.typ) {
        banner.style.display = "block";
        timerLabel.style.visibility = "visible";
        document.getElementById("typ").innerText = m.typ;
        document.getElementById("adresa").innerText = m.miesto || "";
        
        // Zobrazenie mapy s trasou vozidlom (&dirflg=d) len na PC/TV
        if (m.miesto && m.miesto.length > 2 && window.innerWidth > 1024) {
            mapMsg.style.display = "none";
            mapFrame.style.display = "block";
            const s = encodeURIComponent(ZBROJNICA);
            const c = encodeURIComponent(m.miesto);
            mapFrame.src = `https://www.google.com/maps/embed/v1/directions?key=AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s&origin=${s}&destination=${c}&mode=driving`;
            // Poznámka: Ak by bol problém s API key, vrátime sa k: 
            // mapFrame.src = `https://maps.google.com/maps?saddr=${s}&daddr=${c}&dirflg=d&output=embed`;
        }
        startTracking(m.timestamp);
    }

    Object.keys(d).forEach(k => {
        if (k === "__metadata") return;
        const div = document.createElement("div");
        div.className = "item " + (d[k] === "IDEM" ? "idem" : "nejdem");
        div.innerText = k;
        (d[k] === "IDEM" ? idemDiv : nejdemDiv).appendChild(div);
    });
});

function startTracking(start) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(async () => {
        const now = Date.now();
        const diffSeconds = Math.floor((now - start) / 1000);
        const min = Math.floor(diffSeconds / 60);
        const sec = diffSeconds % 60;
        document.getElementById("timer").innerText = `${min}:${sec.toString().padStart(2, "0")}`;
        
        if (diffSeconds >= AUTO_RESET_MINUTES * 60) {
            clearInterval(timerInterval);
            await autoArchiveAndReset();
        }
    }, 1000);
}

async function autoArchiveAndReset() {
    const ref = db.collection("vyjazdy").doc("active");
    const snap = await ref.get();
    if (snap.exists) {
        const d = snap.data();
        await db.collection("archiv").add({
            datum: firebase.firestore.Timestamp.now(),
            info: (d.__metadata?.typ || "Neznáma") + " - " + (d.__metadata?.miesto || ""),
            isli: Object.keys(d).filter(k => k !== "__metadata" && d[k] === "IDEM"),
            nejdli: Object.keys(d).filter(k => k !== "__metadata" && d[k] === "NEJDEM")
        });
        await ref.delete();
    }
}

async function manualReset() {
    if (confirm("Ukončiť výjazd a uložiť do archívu?")) {
        await autoArchiveAndReset();
    }
}

window.onload = spracujVstup;
</script>
</body>
</html>
