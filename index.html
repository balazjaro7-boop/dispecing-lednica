<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHZ Lednica - DISPEČING</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
:root{
    --bg:#07090c;
    --panel:#10141a;
    --green:#00e676;
    --gray:#888;
    --red:#ff1744;
}

*{box-sizing:border-box;}

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Segoe UI,sans-serif;
    background:var(--bg);
    color:#fff;
    overflow:hidden;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 25px;
    background:#000;
    border-bottom:2px solid #222;
    flex:0 0 auto;
}

.title{
    font-size:1.6rem;
    font-weight:700;
    color:#aaa;
}

.clock{
    font-size:2.8rem;
    font-family:monospace;
}

/* EVENT */
.banner{
    flex:0 0 auto;
    padding:15px;
    text-align:center;
    background:linear-gradient(90deg,#8b0000,#ff1744);
}

.event-type{
    font-size:clamp(1.8rem,3vw,3.5rem);
    font-weight:900;
}

.event-address{
    font-size:clamp(1rem,2vw,1.8rem);
    color:#ffeb3b;
    margin-top:5px;
}

/* MAIN */
.main{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
    overflow:hidden;
}

/* COLUMN */
.col{
    background:var(--panel);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border-radius:6px;
}

.col h2{
    margin:10px 0;
    text-align:center;
    font-size:1.5rem;
}

/* LIST */
.list{
    flex:1;
    overflow:hidden;
    padding:5px 10px;
    display:flex;
    flex-direction:column;
    gap:4px;
}

/* ROW */
.item{
    padding:4px 6px;
    font-size:clamp(0.9rem,1.5vw,1.4rem);
    display:flex;
    align-items:center;
}

/* ZVÝRAZNENIE (jemné) */
.idem{
    color:var(--green);
    background:rgba(0,230,118,0.08);
}

.nejdem{
    color:var(--gray);
    background:rgba(255,255,255,0.03);
}

/* FOOTER */
.footer{
    flex:0 0 auto;
    padding:6px 20px;
    background:#000;
    border-top:1px solid #222;
    font-size:0.9rem;
    color:#555;
}

/* MOBILE STACK */
@media (max-width:700px){
    .main{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="title">DHZ LEDNICA – DISPEČING</div>
    <div id="clock" class="clock">00:00:00</div>
</div>

<div id="banner" class="banner">
    <div id="typ" class="event-type">ČAKÁM</div>
    <div id="adresa" class="event-address"></div>
</div>

<div class="main">
    <div class="col">
        <h2>IDEM</h2>
        <div id="idem" class="list"></div>
    </div>

    <div class="col">
        <h2>NEJDEM</h2>
        <div id="nejdem" class="list"></div>
    </div>
</div>

<div class="footer">
    📂 ARCHÍV VÝJAZDOV
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* CLOCK */
setInterval(()=>{
    const d=new Date();
    document.getElementById("clock").innerText =
    d.toLocaleTimeString("sk-SK");
},1000);

/* REALTIME */
db.collection("vyjazdy").doc("active").onSnapshot(doc=>{

    const idem=document.getElementById("idem");
    const nejdem=document.getElementById("nejdem");

    idem.innerHTML="";
    nejdem.innerHTML="";

    if(!doc.exists) return;

    const d=doc.data();
    const m=d.__metadata||{};

    document.getElementById("typ").innerText=m.typ||"VÝJAZD";
    document.getElementById("adresa").innerText=m.miesto||"";

    Object.keys(d).forEach(k=>{
        if(k==="__metadata") return;

        const div=document.createElement("div");
        div.className="item";

        div.innerText=k;

        if(d[k]==="IDEM"){
            div.classList.add("idem");
            idem.appendChild(div);
        }else{
            div.classList.add("nejdem");
            nejdem.appendChild(div);
        }
    });
});
</script>

</body>
</html>
