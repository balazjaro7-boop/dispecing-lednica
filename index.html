<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHZ Lednica - DISPEČING</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
:root{
    --bg:#07090c;
    --panel:#10141a;
    --green:#00e676;
    --gray:#888;
    --red:#ff1744;
    --yellow:#ffeb3b;
}

*{box-sizing:border-box;}

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Segoe UI,sans-serif;
    background:var(--bg);
    color:#fff;
    overflow:hidden;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#000;
    border-bottom:2px solid #222;
    flex:0 0 auto;
}

/* LEFT */
.brand{
    font-size:1.3rem;
    font-weight:700;
    color:#aaa;
}

/* CENTER TIMER */
.center-timer{
    font-size:1.6rem;
    font-family:monospace;
    color:var(--yellow);
}

/* RIGHT */
.right{
    display:flex;
    align-items:center;
    gap:10px;
}

.clock{
    font-family:monospace;
    font-size:1.4rem;
}

.reset{
    background:#222;
    color:#aaa;
    border:1px solid #333;
    padding:4px 10px;
    cursor:pointer;
    font-size:0.8rem;
}

.reset:hover{
    background:#ff1744;
    color:#fff;
}

/* EVENT */
.banner{
    flex:0 0 auto;
    padding:10px;
    text-align:center;
    background:linear-gradient(90deg,#8b0000,#ff1744);
}

.event-type{
    font-size:2.2rem;
    font-weight:900;
}

.event-address{
    font-size:1.2rem;
    color:#ffeb3b;
}

/* MAIN */
.main{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
}

/* COL */
.col{
    display:flex;
    flex-direction:column;
    overflow:hidden;
    padding:5px;
}

.title{
    text-align:center;
    font-size:1.2rem;
    margin:5px 0;
}

/* LIST */
.list{
    overflow:hidden;
    display:flex;
    flex-direction:column;
    gap:2px;
}

/* ROW */
.item{
    padding:2px 4px;
    font-size:1rem;
}

.idem{
    color:var(--green);
    background:rgba(0,230,118,0.08);
}

.nejdem{
    color:var(--gray);
    background:rgba(255,255,255,0.03);
}

/* FOOTER */
.footer{
    flex:0 0 auto;
    padding:6px 15px;
    font-size:0.8rem;
    color:#444;
    background:#000;
    cursor:pointer;
}
.footer:hover{
    color:#999;
}
</style>
</head>

<body>

<div class="header">
    <div class="brand">DHZ LEDNICA DISPEČING</div>

    <div id="timer" class="center-timer">--:--</div>

    <div class="right">
        <div id="clock" class="clock">00:00:00</div>
        <button class="reset" onclick="manualReset()">RESET</button>
    </div>
</div>

<div id="banner" class="banner">
    <div id="typ" class="event-type">ČAKÁM</div>
    <div id="adresa" class="event-address"></div>
</div>

<div class="main">
    <div class="col">
        <div class="title">IDEM</div>
        <div id="idem" class="list"></div>
    </div>

    <div class="col">
        <div class="title">NEJDEM</div>
        <div id="nejdem" class="list"></div>
    </div>
</div>

<div class="footer" onclick="window.location.href='archiv.html'">
    📂 ARCHÍV VÝJAZDOV
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let timerInterval;

/* CLOCK */
setInterval(()=>{
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("sk-SK");
},1000);

/* SNAPSHOT */
db.collection("vyjazdy").doc("active").onSnapshot(doc=>{

    const idem=document.getElementById("idem");
    const nejdem=document.getElementById("nejdem");

    idem.innerHTML="";
    nejdem.innerHTML="";

    if(!doc.exists){
        resetUI();
        return;
    }

    const d=doc.data();
    const m=d.__metadata||{};

    document.getElementById("typ").innerText=m.typ||"VÝJAZD";
    document.getElementById("adresa").innerText=m.miesto||"";

    if(m.timestamp) startTimer(m.timestamp);

    Object.keys(d).forEach(k=>{
        if(k==="__metadata") return;

        const div=document.createElement("div");
        div.className="item";

        div.innerText=k;

        if(d[k]==="IDEM"){
            div.classList.add("idem");
            idem.appendChild(div);
        }else{
            div.classList.add("nejdem");
            nejdem.appendChild(div);
        }
    });
});

/* TIMER B */
function startTimer(start){
    clearInterval(timerInterval);

    timerInterval=setInterval(async()=>{
        const left = 1800 - Math.floor((Date.now()-start)/1000);

        if(left<=0){
            clearInterval(timerInterval);
            await autoReset();
            return;
        }

        const m=Math.floor(left/60);
        const s=left%60;

        document.getElementById("timer").innerText =
        `${m}:${s.toString().padStart(2,"0")}`;

    },1000);
}

/* RESET UI */
function resetUI(){
    document.getElementById("typ").innerText="ČAKÁM";
    document.getElementById("adresa").innerText="";
    document.getElementById("timer").innerText="--:--";
}

/* MANUAL RESET */
async function manualReset(){
    if(confirm("RESET + ARCHÍV?")){
        await autoReset();
    }
}

/* AUTO RESET + ARCHIV */
async function autoReset(){
    const ref=db.collection("vyjazdy").doc("active");
    const snap=await ref.get();

    if(snap.exists){
        const d=snap.data();
        const m=d.__metadata||{};

        const ide=[], nej=[];

        Object.keys(d).forEach(k=>{
            if(k!=="__metadata"){
                (d[k]==="IDEM"?ide:nej).push(k);
            }
        });

        if(m.typ){
            await db.collection("archiv").add({
                datum:firebase.firestore.Timestamp.now(),
                info:m.typ+" "+(m.miesto||""),
                isli:ide,
                nejdli:nej
            });
        }

        await ref.delete();
    }

    resetUI();
}
</script>

</body>
</html>
