<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHZ LEDNICA - DISPEČING</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #cccccc; 
            --accent-red: #d32f2f;
            --accent-green: #2e7d32;
            --text-dark: #000000; 
            --header-bg: #141414;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: white; 
            margin: 0; padding: 0; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        .header { 
            background-color: var(--header-bg); 
            padding: 10px 30px; 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 4px solid var(--accent-red);
            height: 90px;
            box-sizing: border-box;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-logo { height: 75px; width: auto; }
        .header-title { font-size: 26px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .clock { 
            font-size: 55px; 
            font-weight: 900; 
            color: #ffffff; 
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 2px;
            line-height: 1;
        }

        /* ŽLTÝ BOX S PULZOVANÍM */
        .info-box { 
            background: #222; padding: 12px; margin: 10px 20px; 
            border: 3px solid #ffeb3b; color: #ffeb3b; 
            font-size: 26px; font-weight: bold; text-align: center; border-radius: 4px;
            text-transform: uppercase;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 5px #ffeb3b; border-color: #ffeb3b; }
            50% { box-shadow: 0 0 20px #ffeb3b; border-color: #fff176; }
            100% { box-shadow: 0 0 5px #ffeb3b; border-color: #ffeb3b; }
        }

        .main-container { display: flex; flex: 1; gap: 20px; padding: 10px 20px; box-sizing: border-box; }

        .section { 
            flex: 1; background-color: var(--card-bg); border-radius: 8px;
            display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        
        .section-header { 
            padding: 15px; font-size: 32px; font-weight: 900; text-align: center; 
            background: rgba(0,0,0,0.1);
            border-bottom: 4px solid rgba(0,0,0,0.1); 
        }
        .idem-title { color: var(--accent-green); }
        .nejdem-title { color: var(--accent-red); }

        .names-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 15px; align-content: start; }
        
        /* ČISTÉ MENÁ SO ZEBRA EFEKTOM */
        .name-item { 
            font-size: 32px; font-weight: 900; color: var(--text-dark); 
            padding: 10px 15px; 
            text-transform: uppercase;
            display: flex;
            align-items: center;
        }

        /* Zebra pre 2 stĺpce (strieda dvojice riadkov) */
        .name-item:nth-child(4n+1), 
        .name-item:nth-child(4n+2) { 
            background: rgba(0,0,0,0.07); 
        }

        .idem-border { border-left: 12px solid var(--accent-green); }
        .nejdem-border { border-left: 12px solid var(--accent-red); }

        .footer { padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; background: #111; height: 50px; }
        .timer-container { position: absolute; left: 50%; transform: translateX(-50%); color: #888; font-weight: bold; font-size: 18px; }
        #reset-timer { color: var(--accent-red); font-size: 20px; font-weight: 900; }
        .nav-link { color: #555; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <img src="logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
        <div class="header-title">DHZ Lednica | <span style="font-weight: 300; color: #888;">Dispečing</span></div>
    </div>
    <div class="clock" id="live-clock">00:00:00</div>
</div>

<div id="vyjazd-info" class="info-box" style="display:none;"></div>

<div class="main-container">
    <div class="section">
        <div class="section-header idem-title">🟢 IDEM</div>
        <div id="list-idem" class="names-grid"></div>
    </div>

    <div class="section">
        <div class="section-header nejdem-title">🔴 NEJDEM</div>
        <div id="list-nejdem" class="names-grid"></div>
    </div>
</div>

<div class="footer">
    <a href="archiv.html" class="nav-link">Archív</a>
    <div class="timer-container">RESET ZA: <span id="reset-timer">--:--</span></div>
    <div class="nav-link" style="cursor: default;">Live Systém v1.3</div>
</div>

<script>
    // --- SEM KONFIGURÁCIU ---
    const firebaseConfig = {
        apiKey: "TVOJ_API_KEY",
        authDomain: "hasici-lednica.firebaseapp.com",
        projectId: "hasici-lednica",
        storageBucket: "hasici-lednica.appspot.com",
        messagingSenderId: "747340639310",
        appId: "TVOJE_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("vyjazdy").doc("active");

    function updateClock() {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('sk-SK');
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function archiveAndReset(data) {
        const huraIdem = [];
        const smolaNejdem = [];
        for (const [meno, stav] of Object.entries(data)) {
            if (meno !== 'lastUpdate' && meno !== 'infoText') {
                if (stav === "IDEM") huraIdem.push(meno);
                if (stav === "NEMÔŽEM" || stav === "NEJDEM" || stav === "NEJDE") smolaNejdem.push(meno);
            }
        }
        if (huraIdem.length > 0 || smolaNejdem.length > 0) {
            await db.collection("archiv").add({
                datum: firebase.firestore.FieldValue.serverTimestamp(),
                info: data.infoText || "BEZ TEXTU",
                isli: huraIdem,
                nejdli: smolaNejdem
            });
        }
        const updates = { infoText: "" };
        Object.keys(data).forEach(key => {
            if (key !== 'lastUpdate' && key !== 'infoText') updates[key] = "NEZADANÉ";
        });
        await docRef.update(updates);
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('meno')) {
        let up = { lastUpdate: firebase.firestore.FieldValue.serverTimestamp() };
        up[params.get('meno')] = params.get('akcia');
        docRef.update(up).then(() => { window.history.replaceState({}, document.title, "/"); });
    }

    docRef.onSnapshot((doc) => {
        const data = doc.data();
        if (!data) return;

        const infoDiv = document.getElementById("vyjazd-info");
        if (data.infoText) {
            infoDiv.innerText = "HLÁSENIE: " + data.infoText;
            infoDiv.style.display = "block";
        } else {
            infoDiv.style.display = "none";
        }

        const lI = document.getElementById("list-idem");
        const lN = document.getElementById("list-nejdem");
        lI.innerHTML = ""; lN.innerHTML = "";

        if (data.lastUpdate) {
            const updateTimer = () => {
                const diff = (data.lastUpdate.toDate().getTime() + 1800000) - new Date().getTime();
                if (diff <= 0) {
                    archiveAndReset(data);
                    document.getElementById("reset-timer").innerText = "00:00";
                } else {
                    const m = Math.floor(diff / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById("reset-timer").innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }
            };
            setInterval(updateTimer, 1000);
            updateTimer();
        }

        const entries = Object.entries(data)
            .filter(([m]) => m !== 'lastUpdate' && m !== 'infoText')
            .sort((a, b) => a[0].localeCompare(b[0]));

        for (const [m, s] of entries) {
            if (s === "IDEM") {
                lI.innerHTML += `<div class="name-item idem-border">${m}</div>`;
            } else if (s === "NEMÔŽEM" || s === "NEJDEM" || s === "NEJDE") {
                lN.innerHTML += `<div class="name-item nejdem-border">${m}</div>`;
            }
        }
    });
</script>
</body>
</html>
