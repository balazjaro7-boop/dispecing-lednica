<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let timerInterval;

setInterval(() => { document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK"); }, 1000);

async function spracujVstup() {
    const params = new URLSearchParams(window.location.search);
    const u = params.get('udalost'), adr = params.get('miesto'), akc = params.get('akcia'), t = params.get('typ'); 
    const ref = db.collection("vyjazdy").doc("active");

    if (u) {
        await ref.set({ __metadata: { typ: u, miesto: adr || "", timestamp: Date.now() } }, { merge: true });
        sendPushover(u, adr, t);
        window.history.replaceState({}, '', window.location.pathname);
    }
    if (akc) {
        let meno = localStorage.getItem('h_meno') || prompt("Zadaj meno:");
        if (meno) { localStorage.setItem('h_meno', meno); await ref.set({ [meno]: akc }, { merge: true }); }
        window.history.replaceState({}, '', window.location.pathname);
    }
}

function sendPushover(udalost, miesto, skupinaTyp) {
    const apiToken = "arrtgeqpd5uczfjk1x918fgziguqp9";
    const groupVyjazd = (skupinaTyp === "AED") ? "gzv839iw4b249tqay7jicqzaw53w42" : "g796q69yjbfy1v2e2kc5enwqn57j1x";
    const baseUrl = "https://hasici-lednica.web.app/index.html";
    const msg = `<b>UDALOSŤ:</b> ${udalost}\n<b>MIESTO:</b> ${miesto || "Nezadané"}\n\n<a href="${baseUrl}?akcia=IDEM">✅ IDEM</a>\n<a href="${baseUrl}?akcia=NEJDEM">❌ NEJDEM</a>`;
    const mapsUrl = miesto ? `http://maps.google.com/maps?daddr=${encodeURIComponent(miesto)}` : baseUrl;

    fetch("https://api.pushover.net/1/messages.json", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
            token: apiToken, user: groupVyjazd, message: msg, title: "🚨 DHZ LEDNICA", priority: 2, retry: 60, expire: 3600, sound: "siren", html: 1, url: mapsUrl, url_title: "📍 SPUSTIŤ NAVIGÁCIU"
        })
    });
}

db.collection("vyjazdy").doc("active").onSnapshot(doc => {
    const idemDiv = document.getElementById("idem"), nejdemDiv = document.getElementById("nejdem");
    const banner = document.getElementById("banner"), mapFrame = document.getElementById("map-frame"), mapMsg = document.getElementById("map-msg");
    idemDiv.innerHTML = ""; nejdemDiv.innerHTML = "";

    if (!doc.exists) {
        banner.style.display = "none"; 
        mapFrame.style.display = "none"; 
        mapMsg.style.display = "block";
        document.getElementById("timer").innerText = "00:00"; 
        if(timerInterval) clearInterval(timerInterval); 
        return;
    }

    const d = doc.data(), m = d.__metadata || {};
    if (m.typ) {
        banner.style.display = "block";
        const textUdalosti = m.typ.toLowerCase();
        const prefixElem = document.getElementById("prefix");
        
        if (textUdalosti.includes("nehoda") || textUdalosti.includes("voda") || textUdalosti.includes("vody") || textUdalosti.includes("strom") || textUdalosti.includes("technic")) {
            prefixElem.innerText = "TECHNICKÝ VÝJAZD";
        } else {
            prefixElem.innerText = "POŽIAR";
        }

        document.getElementById("typ").innerText = m.typ;
        document.getElementById("adresa").innerText = m.miesto || "";
        
        if (m.miesto && m.miesto.length > 2) {
            mapMsg.style.display = "none"; 
            mapFrame.style.display = "block";

            const origin = encodeURIComponent("Lednica 243");
            const destination = encodeURIComponent(m.miesto);

            // 🔥 HLAVNÁ TRASA
            let mapUrl = `https://www.google.com/maps?output=embed&hl=sk&dirflg=d&origin=${origin}&destination=${destination}`;

            mapFrame.src = mapUrl;

            // 🔁 FALLBACK – ak by Google trasu nezobrazil
            setTimeout(() => {
                if (!mapFrame.contentWindow || mapFrame.src === mapUrl) {
                    mapFrame.src = `https://maps.google.com/maps?hl=sk&output=embed&q=${destination}`;
                }
            }, 4000);
        }

        startTimer(m.timestamp);
    }

    Object.keys(d).forEach(k => {
        if (k === "__metadata") return;
        const div = document.createElement("div");
        div.className = "item " + (d[k] === "IDEM" ? "idem" : "nejdem");
        div.innerText = k;
        (d[k] === "IDEM" ? idemDiv : nejdemDiv).appendChild(div);
    });
});

function startTimer(start) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - start) / 1000);
        document.getElementById("timer").innerText = `${Math.floor(elapsed / 60)}:${(elapsed % 60).toString().padStart(2,"0")}`;
    }, 1000);
}

async function manualReset() { 
    if (confirm("Resetovať výjazd?")) 
        await db.collection("vyjazdy").doc("active").delete(); 
}

window.onload = spracujVstup;
</script>
