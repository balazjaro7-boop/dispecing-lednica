<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>DISPEČING DHZ LEDNICA</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Arial Black', sans-serif; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* HODINY VPRAVO HORE */
        .header { 
            display: flex; 
            justify-content: flex-end; 
            padding: 10px 40px; 
            height: 110px; 
        }
        .clock { 
            font-size: 6em; 
            font-family: 'Courier New', monospace; 
            font-weight: 900; 
            color: #fff; 
        }

        /* STROBOSKOP BANNER */
        .banner { 
            text-align: center; 
            padding: 20px; 
            min-height: 180px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            animation: stroboskop 0.8s infinite; 
            margin-bottom: 20px;
        }

        @keyframes stroboskop {
            0% { background: #cc0000; color: #fff; }
            50% { background: #ffeb3b; color: #000; }
            100% { background: #cc0000; color: #fff; }
        }

        .u-text { 
            font-size: 5em; 
            font-weight: 900; 
            text-transform: uppercase; 
            line-height: 1;
        }

        /* HLAVNÁ MRIEŽKA PRE MENÁ */
        .main-content { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 50px; 
            padding: 0 40px 20px 40px; 
            flex-grow: 1; 
        }

        .col-title { 
            font-size: 3.5em; 
            font-weight: 900; 
            border-bottom: 5px solid #222; 
            margin-bottom: 20px; 
        }

        /* AUTO-STĹPCE PRE MENÁ */
        .names-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 15px; 
            align-content: start; 
        }

        .name-entry { 
            font-size: 3em; 
            font-weight: 900; 
            text-transform: uppercase; 
            white-space: nowrap; 
        }

        .color-idem { color: #4caf50; }
        .color-nejdem { color: #333; }

        /* SKRYTÝ RESET */
        .btn-reset { position: absolute; left: 0; top: 0; opacity: 0.05; background: none; border: none; color: #fff; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<button class="btn-reset" onclick="manualReset()">RESET</button>

<div class="header">
    <div id="clock" class="clock">00:00:00</div>
</div>

<div id="banner" class="banner" style="display:none">
    <div id="u-display" class="u-text"></div>
</div>

<div class="main-content">
    <div>
        <div class="col-title" style="color:#4caf50">IDEM</div>
        <div id="list-idem" class="names-grid"></div>
    </div>
    <div>
        <div class="col-title" style="color:#444">NEJDEM</div>
        <div id="list-nejdem" class="names-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
        authDomain: "hasici-lednica.firebaseapp.com",
        projectId: "hasici-lednica",
        storageBucket: "hasici-lednica.firebasestorage.app",
        messagingSenderId: "747340639310",
        appId: "1:747340639310:web:e6cba7417ffae4ed59e71f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Hodiny v reálnom čase
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('sk-SK');
    }, 1000);

    // Spracovanie URL (ak naskočí udalosť alebo meno)
    const params = new URLSearchParams(window.location.search);
    const u = params.get('udalost');
    const a = params.get('akcia');

    if (u) {
        db.collection("vyjazdy").doc("active").set({ info: u, cas: Date.now() }, { merge: true });
        window.history.replaceState({}, '', '/');
    }
    if (a) {
        let m = localStorage.getItem('h_meno') || prompt("Meno:");
        if (m) { 
            localStorage.setItem('h_meno', m); 
            db.collection("vyjazdy").doc("active").set({ [m]: a }, { merge: true }); 
        }
        window.history.replaceState({}, '', '/');
    }

    // Živá aktualizácia plochy
    db.collection("vyjazdy").doc("active").onSnapshot(doc => {
        const d_idem = document.getElementById('list-idem');
        const d_nejdem = document.getElementById('list-nejdem');
        const d_banner = document.getElementById('banner');
        d_idem.innerHTML = ''; d_nejdem.innerHTML = '';

        if (!doc.exists) { 
            d_banner.style.display = 'none'; 
            return; 
        }

        const data = doc.data();
        if (data.info) {
            d_banner.style.display = 'flex';
            document.getElementById('u-display').innerText = data.info;
        } else { 
            d_banner.style.display = 'none'; 
        }

        Object.keys(data).sort().forEach(key => {
            if (key === 'info' || key === 'cas') return;
            const div = document.createElement('div');
            div.className = 'name-entry';
            div.innerText = key;
            if (data[key] === 'IDEM') { 
                div.classList.add('color-idem'); 
                d_idem.appendChild(div); 
            } else { 
                div.classList.add('color-nejdem'); 
                d_nejdem.appendChild(div); 
            }
        });
    });

    // Reset a Archív
    async function manualReset() {
        if (!confirm("Uložiť výjazd a vymazať plochu?")) return;
        const ref = db.collection("vyjazdy").doc("active");
        const snap = await ref.get();
        if (snap.exists) {
            const d = snap.data();
            const idem = [], nejdem = [];
            Object.keys(d).forEach(k => { if(k !== 'info' && k !== 'cas') (d[k] === 'IDEM' ? idem : nejdem).push(k); });
            
            // Zápis do archívu
            await db.collection("archiv").add({ 
                datum: firebase.firestore.Timestamp.now(), 
                info: d.info || "Výjazd bez popisu", 
                idem: idem, 
                nejdem: nejdem 
            });
            
            // Vymazanie aktívnej plochy
            await ref.delete();
        }
    }
</script>
</body>
</html>
