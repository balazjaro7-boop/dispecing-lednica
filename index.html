<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHZ Lednica - Live Dispečing</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #2c3e50; color: white; margin: 0; padding: 0; }
        .header { background-color: #e74c3c; padding: 20px; text-align: center; box-shadow: 0 4px 5px rgba(0,0,0,0.3); }
        h1 { margin: 0; font-size: 2.2em; text-transform: uppercase; }
        .subtitle { font-size: 1em; margin-top: 5px; opacity: 0.9; }
        
        .main-container { display: flex; flex-direction: row; padding: 20px; gap: 20px; justify-content: center; }
        .column { flex: 1; max-width: 500px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; min-height: 400px; }
        .column h2 { text-align: center; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        .hasic-box { 
            padding: 25px; 
            margin: 15px 0; 
            border-radius: 15px; 
            font-size: 1.8em; 
            font-weight: bold; 
            text-align: center;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        }

        .idem { background-color: #27ae60; border-left: 10px solid #1e8449; }
        .nejdem { background-color: #c0392b; border-left: 10px solid #922b21; }
        .nezadane { background-color: #7f8c8d; opacity: 0.5; font-size: 1.2em; }

        .loading { text-align: center; margin-top: 50px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚒 DHZ LEDNICA - LIVE DISPEČING</h1>
        <div class="subtitle">Aktuálny stav výjazdu v reálnom čase</div>
    </div>

    <div id="loading" class="loading">Nahrávam údaje z databázy...</div>

    <div class="main-container">
        <div class="column">
            <h2>🟢 IDEM</h2>
            <div id="list-idem"></div>
        </div>
        <div class="column">
            <h2>🔴 NEJDEM</h2>
            <div id="list-nejdem"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
            authDomain: "hasici-lednica.firebaseapp.com",
            projectId: "hasici-lednica",
            storageBucket: "hasici-lednica.firebasestorage.app",
            messagingSenderId: "747340639310",
            appId: "1:747340639310:web:e6cba7417ffae4ed59e71f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function spracujVstup() {
            const urlParams = new URLSearchParams(window.location.search);
            const akcia = urlParams.get('akcia');

            if (akcia) {
                let meno = localStorage.getItem('mojeMeno_DHZ');
                if (!meno) {
                    meno = prompt("Tento mobil nemá meno. Napíš ako sa voláš (napr. Jano):");
                    if (meno) localStorage.setItem('mojeMeno_DHZ', meno);
                    else return;
                }

                try {
                    await db.collection("vyjazdy").doc("active").set({
                        [meno]: akcia
                    }, { merge: true });
                    window.history.replaceState({}, document.title, "/");
                } catch (e) { console.error(e); }
            }
        }

        function sledovatStav() {
            db.collection("vyjazdy").doc("active").onSnapshot((doc) => {
                if (doc.exists) {
                    document.getElementById('loading').style.display = 'none';
                    const data = doc.data();
                    const listIdem = document.getElementById('list-idem');
                    const listNejdem = document.getElementById('list-nejdem');
                    
                    listIdem.innerHTML = '';
                    listNejdem.innerHTML = '';

                    Object.keys(data).sort().forEach(meno => {
                        const stav = data[meno];
                        const div = document.createElement('div');
                        div.className = 'hasic-box ' + (stav === 'IDEM' ? 'idem' : 'nejdem');
                        div.innerText = meno;

                        if (stav === 'IDEM') listIdem.appendChild(div);
                        else listNejdem.appendChild(div);
                    });
                }
            });
        }

        window.onload = () => {
            spracujVstup();
            sledovatStav();
        };
    </script>
</body>
</html>
