<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHZ Lednica - DISPEČING</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* TVOJ DIZAJN */
:root{--bg:#07090c;--panel:#10141a;--green:#00e676;--gray:#888;--red:#ff1744;--yellow:#ffeb3b;}
body{margin:0;height:100vh;display:flex;flex-direction:column;font-family:Segoe UI;background:var(--bg);color:#fff;}
.header{display:flex;justify-content:space-between;padding:10px 20px;background:#000;}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{height:45px;}
.clock{font-family:monospace;font-size:1.8rem;font-weight:bold;}
.main{flex:1;display:grid;grid-template-columns:300px 1fr 300px;gap:15px;padding:10px;}
.map-container{border:1px solid #222;border-radius:4px;overflow:hidden;}
#map{width:100%;height:100%;}
.col{background:var(--panel);padding:10px;border-radius:4px;}
.item{padding:6px;font-weight:bold;}
.idem{color:var(--green);}
.nejdem{color:var(--gray);}
#banner{display:none;padding:10px;text-align:center;background:#8b0000;}
</style>
</head>

<body>

<div class="header">
<div class="brand"><img src="logo.png"><span>DHZ LEDNICA</span></div>
<div id="clock" class="clock"></div>
<button onclick="manualReset()">RESET</button>
</div>

<div id="banner">
<span id="typ"></span> - <span id="adresa"></span>
</div>

<div class="main">
<div class="col"><div>IDEM</div><div id="idem"></div></div>
<div class="map-container"><div id="map"></div></div>
<div class="col"><div>NEJDEM</div><div id="nejdem"></div></div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSy...",projectId:"hasici-lednica"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let map,routeLayer,markerCiel,timerInterval;
const hasicaren=[49.109077,18.214097];

function initMap(){
map=L.map('map').setView(hasicaren,15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker(hasicaren).addTo(map);
}

async function drawRoute(miesto){
try{
const geo=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(miesto+", Slovensko")}`).then(r=>r.json());
if(!geo.length)return;

const ciel=[geo[0].lat,geo[0].lon];
const route=await fetch(`https://router.project-osrm.org/route/v1/driving/${hasicaren[1]},${hasicaren[0]};${ciel[1]},${ciel[0]}?overview=full&geometries=geojson`).then(r=>r.json());

if(routeLayer) map.removeLayer(routeLayer);
if(markerCiel) map.removeLayer(markerCiel);

routeLayer=L.geoJSON(route.routes[0].geometry,{style:{color:'#ff1744',weight:5}}).addTo(map);
markerCiel=L.marker(ciel).addTo(map);
map.fitBounds(routeLayer.getBounds());

}catch(e){}
}

db.collection("vyjazdy").doc("active").onSnapshot(async doc=>{
const idem=document.getElementById("idem");
const nejdem=document.getElementById("nejdem");
idem.innerHTML="";nejdem.innerHTML="";

if(!doc.exists)return;

const d=doc.data();
const m=d.__metadata||{};

if(m.typ){
document.getElementById("banner").style.display="block";
document.getElementById("typ").innerText=m.typ;
document.getElementById("adresa").innerText=m.miesto||"";
drawRoute(m.miesto);
startTimer(m.timestamp);
}

Object.keys(d).forEach(k=>{
if(k==="__metadata")return;
let div=document.createElement("div");
div.className="item "+(d[k]==="IDEM"?"idem":"nejdem");
div.innerText=k;
(d[k]==="IDEM"?idem:nejdem).appendChild(div);
});
});

function startTimer(s){
if(timerInterval)clearInterval(timerInterval);
timerInterval=setInterval(()=>{
const e=Math.floor((Date.now()-s)/1000);
if(e>=900)autoArchive();
},1000);
}

async function autoArchive(){
const ref=db.collection("vyjazdy").doc("active");
const doc=await ref.get();
if(doc.exists){
await db.collection("archiv").add({...doc.data(),datum:new Date().toLocaleString("sk-SK")});
await ref.delete();
}
}

async function manualReset(){
const heslo=prompt("Heslo:");
if(heslo==="1122"){
await autoArchive();
}else{
alert("Zlé heslo");
}
}

setInterval(()=>{document.getElementById("clock").innerText=new Date().toLocaleTimeString("sk-SK")},1000);

window.onload=initMap;
</script>

</body>
</html>
