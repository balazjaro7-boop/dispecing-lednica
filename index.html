<script>
async function spracujVyzjazd() {
    const urlParams = new URLSearchParams(window.location.search);
    const akcia = urlParams.get('akcia');
    
    if (akcia) {
        // 1. Skúsime získať meno z pamäte mobilu
        let meno = localStorage.getItem('mojeMeno');
        
        // 2. Ak meno v pamäti nie je, vypýtame si ho
        if (!meno) {
            const vybraneMeno = prompt("Tento mobil ešte nie je priradený. Napíš svoje meno (presne ako je v systéme):", "Jaroslav Baláž");
            if (vybraneMeno) {
                localStorage.setItem('mojeMeno', vybraneMeno);
                meno = vybraneMeno;
            } else {
                alert("Bez mena ťa nemôžem zapísať.");
                return;
            }
        }
        
        // 3. Teraz už meno máme, zapíšeme ho do Firebase
        try {
            const docRef = doc(db, "vyjazdy", "active");
            await updateDoc(docRef, {
                [meno]: akcia === 'IDEM' ? 'IDEM' : 'NEMOZEM'
            });
            console.log("Úspešne zapísané!");
        } catch (e) {
            console.error("Chyba pri zápise: ", e);
        }
    }
}
</script>
