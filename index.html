<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>DHZ Lednica - OPERAČNÉ</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* HODINY VPRAVO HORE */
        .header { 
            display: flex; 
            justify-content: flex-end; 
            padding: 10px 40px; 
            height: 90px; 
        }
        .clock { 
            font-size: 5em; 
            font-family: monospace; 
            font-weight: 900; 
        }

        /* BLIKAJÚCI BANNER S UDALOSŤOU */
        .event-banner { 
            text-align: center; 
            min-height: 140px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            animation: blink 0.8s infinite; 
            margin-bottom: 10px;
        }

        @keyframes blink {
            0% { background: #cc0000; color: #fff; }
            50% { background: #ffeb3b; color: #000; }
            100% { background: #cc0000; color: #fff; }
        }

        .u-text { 
            font-size: 4em; 
            font-weight: 900; 
            text-transform: uppercase; 
        }

        /* HLAVNÁ PLOCHA */
        .main-content { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 40px; 
            padding: 0 40px 10px 40px; 
            flex-grow: 1; 
            overflow: hidden;
        }

        .col-title { 
            font-size: 2.5em; 
            font-weight: 900; 
            border-bottom: 3px solid #222; 
            margin-bottom: 10px; 
        }

        /* MENÁ O 2/3 MENŠIE */
        .names-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 8px; 
            align-content: start; 
        }

        .name-entry { 
            font-size: 1.2em; /* Zmenšené na tretinu pôvodnej veľkosti */
            font-weight: bold; 
            text-transform: uppercase; 
        }

        .color-idem { color: #4caf50; }
        .color-nejdem { color: #444; }

        /* ARCHÍV DOLU */
        .bottom-bar {
            height: 40px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-top: 1px solid #222;
        }
        .link-archiv {
            color: #555;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
        }

        .btn-reset { position: absolute; left: 5px; top: 5px; opacity: 0.1; background: none; border: none; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<button class="btn-reset" onclick="manualReset()">.</button>

<div class="header">
    <div id="clock" class="clock">00:00:00</div>
</div>

<div id="banner" class="event-banner" style="display:none">
    <div id="u-display" class="u-text"></div>
</div>

<div class="main-content">
    <div>
        <div class="col-title" style="color:#4caf50">IDEM</div>
        <div id="list-idem" class="names-grid"></div>
    </div>
    <div>
        <div class="col-title" style="color:#444">NEJDEM</div>
        <div id="list-nejdem" class="names-grid"></div>
    </div>
</div>

<div class="bottom-bar">
    <a href="archiv.html" class="link-archiv">📂 ARCHÍV VÝJAZDOV</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
        authDomain: "hasici-lednica.firebaseapp.com",
        projectId: "hasici-lednica",
        storageBucket: "hasici-lednica.firebasestorage.app",
        messagingSenderId: "747340639310",
        appId: "1:747340639310:web:e6cba7417ffae4ed59e71f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('sk-SK');
    }, 1000);

    const params = new URLSearchParams(window.location.search);
    const u = params.get('udalost');
    const a = params.get('akcia');

    if (u) {
        db.collection("vyjazdy").doc("active").set({ info: u, cas: Date.now() }, { merge: true });
        window.history.replaceState({}, '', '/');
    }
    if (a) {
        let m = localStorage.getItem('h_meno') || prompt("Meno:");
        if (m) { 
            localStorage.setItem('h_meno', m); 
            db.collection("vyjazdy").doc("active").set({ [m]: a }, { merge: true }); 
        }
        window.history.replaceState({}, '', '/');
    }

    db.collection("vyjazdy").doc("active").onSnapshot(doc => {
        const d_idem = document.getElementById('list-idem');
        const d_nejdem = document.getElementById('list-nejdem');
        const d_banner = document.getElementById('banner');
        d_idem.innerHTML = ''; d_nejdem.innerHTML = '';

        if (!doc.exists) { 
            d_banner.style.display = 'none'; 
            return; 
        }

        const data = doc.data();
        if (data.info) {
            d_banner.style.display = 'flex';
            document.getElementById('u-display').innerText = data.info;
        } else { 
            d_banner.style.display = 'none'; 
        }

        Object.keys(data).sort().forEach(key => {
            if (key === 'info' || key === 'cas') return;
            const div = document.createElement('div');
            div.className = 'name-entry';
            div.innerText = key;
            if (data[key] === 'IDEM') { 
                div.classList.add('color-idem'); 
                d_idem.appendChild(div); 
            } else { 
                div.classList.add('color-nejdem'); 
                d_nejdem.appendChild(div); 
            }
        });
    });

    async function manualReset() {
        if (!confirm("Uložiť výjazd do archívu a vymazať plochu?")) return;
        const ref = db.collection("vyjazdy").doc("active");
        const snap = await ref.get();
        if (snap.exists) {
            const d = snap.data();
            const idem = [], nejdem = [];
            Object.keys(d).forEach(k => { if(k !== 'info' && k !== 'cas') (d[k] === 'IDEM' ? idem : nejdem).push(k); });
            
            await db.collection("archiv").add({ 
                datum: firebase.firestore.Timestamp.now(), 
                info: d.info || "Bez popisu", 
                idem, nejdem 
            });
            await ref.delete();
        }
    }
</script>
</body>
</html>
