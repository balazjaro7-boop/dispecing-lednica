<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHZ Lednica - Operačné Stredisko</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-color: #1e1e1e;
            --accent-red: #d32f2f;
            --accent-green: #388e3c;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow: hidden; /* Fixné rozloženie */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Horná lišta */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background: #000;
            border-bottom: 2px solid var(--accent-red);
        }

        .brand { font-size: 1.5em; font-weight: bold; color: var(--accent-red); }
        .clock { font-size: 1.5em; font-family: monospace; }

        /* Stredový riadok udalosti */
        .event-banner {
            background-color: var(--accent-red);
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 3em;
            font-weight: 900;
            text-transform: uppercase;
            min-height: 1.2em;
            letter-spacing: 3px;
        }

        /* Časomiera */
        .timer-container {
            text-align: center;
            padding: 5px;
            background: #222;
            font-size: 1.2em;
            color: #ffeb3b;
        }

        /* Hlavný panel s menami */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .column {
            background: var(--panel-color);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .column-header {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #333;
        }

        .hasic-card {
            padding: 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 1.6em;
            font-weight: bold;
            text-align: center;
        }

        .idem-card { background-color: var(--accent-green); box-shadow: 0 4px 10px rgba(56, 142, 60, 0.3); }
        .nejdem-card { background-color: #444; color: #aaa; }

        /* Pätička a História */
        .bottom-bar {
            height: 150px;
            background: #0a0a0a;
            border-top: 1px solid #333;
            display: grid;
            grid-template-columns: 350px 1fr;
            padding: 15px;
        }

        .history-panel {
            border-right: 1px solid #333;
            padding-right: 15px;
            font-size: 0.9em;
        }

        .history-title { color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .history-item { color: #555; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">🚒 DHZ LEDNICA - DISPEČING</div>
        <div id="live-clock" class="clock">00:00:00</div>
    </div>

    <div id="event-line" class="event-banner">--- ČAKÁM NA VÝZVU ---</div>

    <div class="timer-container">
        RESTART O: <span id="countdown">30:00</span>
    </div>

    <div class="main-grid">
        <div class="column">
            <div class="column-header" style="color: #4caf50;">🟢 IDEM</div>
            <div id="list-idem"></div>
        </div>
        <div class="column">
            <div class="column-header" style="color: #f44336;">🔴 NEJDEM</div>
            <div id="list-nejdem"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="history-panel">
            <div class="history-title">Posledné výjazdy:</div>
            <div id="history-list">
                <div class="history-item">Žiadne záznamy</div>
            </div>
        </div>
        <div style="text-align: right; color: #333; align-self: end;">v2.0 Beta</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
            authDomain: "hasici-lednica.firebaseapp.com",
            projectId: "hasici-lednica",
            storageBucket: "hasici-lednica.firebasestorage.app",
            messagingSenderId: "747340639310",
            appId: "1:747340639310:web:e6cba7417ffae4ed59e71f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Hodiny
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('sk-SK');
        }, 1000);

        // Funkcia na spracovanie akcie a typu udalosti
        async function spracujVstup() {
            const params = new URLSearchParams(window.location.search);
            const akcia = params.get('akcia');
            const udalost = params.get('udalost');

            // Ak posielaš z HTTP Shortcuts typ udalosti
            if (udalost) {
                await db.collection("vyjazdy").doc("active").set({
                    __metadata: {
                        typ: udalost,
                        timestamp: Date.now()
                    }
                }, { merge: true });
            }

            // Ak hasič kliká IDEM/NEJDEM
            if (akcia) {
                let meno = localStorage.getItem('mojeMeno_DHZ');
                if (!meno) {
                    meno = prompt("Zadaj svoje meno pre tento mobil:");
                    if (meno) localStorage.setItem('mojeMeno_DHZ', meno);
                    else return;
                }
                await db.collection("vyjazdy").doc("active").set({
                    [meno]: akcia
                }, { merge: true });
                window.history.replaceState({}, document.title, "/");
            }
        }

        // Timer a sledovanie DB
        let timerInterval;
        function sledovatStav() {
            db.collection("vyjazdy").doc("active").onSnapshot(async (doc) => {
                if (!doc.exists) return;
                
                const data = doc.data();
                const meta = data.__metadata || {};
                
                // Zobrazenie udalosti
                document.getElementById('event-line').innerText = meta.typ || "--- ČAKÁM NA VÝZVU ---";

                // Logika odpočtu
                if (meta.timestamp) {
                    startTimer(meta.timestamp);
                }

                // Vykreslenie mien
                const listIdem = document.getElementById('list-idem');
                const listNejdem = document.getElementById('list-nejdem');
                listIdem.innerHTML = '';
                listNejdem.innerHTML = '';

                Object.keys(data).forEach(kľúč => {
                    if (kľúč === '__metadata') return;
                    const stav = data[kľúč];
                    const div = document.createElement('div');
                    div.className = `hasic-card ${stav === 'IDEM' ? 'idem-card' : 'nejdem-card'}`;
                    div.innerText = kľúč;
                    
                    if (stav === 'IDEM') listIdem.appendChild(div);
                    else listNejdem.appendChild(div);
                });
            });
        }

        function startTimer(startTime) {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(async () => {
                const teraz = Date.now();
                const rozdiel = Math.floor((teraz - startTime) / 1000);
                const zostava = 1800 - rozdiel; // 30 minút

                if (zostava <= 0) {
                    clearInterval(timerInterval);
                    await resetovatSystem();
                } else {
                    const min = Math.floor(zostava / 60);
                    const sec = zostava % 60;
                    document.getElementById('countdown').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                }
            }, 1000);
        }

        async function resetovatSystem() {
            const snapshot = await db.collection("vyjazdy").doc("active").get();
            if (snapshot.exists) {
                // Tu by sa dala pridať logika na uloženie do histórie
                await db.collection("vyjazdy").doc("active").delete();
                document.getElementById('countdown').innerText = "30:00";
            }
        }

        window.onload = () => {
            spracujVstup();
            sledovatStav();
        };
    </script>
</body>
</html>
