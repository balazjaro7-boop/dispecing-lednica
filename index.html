<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHZ Lednica - DISPEČING</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root{ --bg:#07090c; --panel:#10141a; --green:#00e676; --gray:#888; --red:#ff1744; --yellow:#ffeb3b; }
        body{ margin:0; height:100vh; display:flex; flex-direction:column; font-family:Segoe UI,sans-serif; background:var(--bg); color:#fff; overflow:hidden; }
        .header{ display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#000; border-bottom:2px solid #222; flex:0 0 auto; }
        .brand{ font-size:1.3rem; font-weight:700; color:#aaa; }
        .center-timer{ font-size:1.6rem; font-family:monospace; color:var(--yellow); }
        .clock{ font-family:monospace; font-size:1.8rem; font-weight:bold; }
        .reset{ background:#222; color:#aaa; border:1px solid #333; padding:4px 10px; cursor:pointer; font-size:0.8rem; border-radius:3px; }
        
        #banner { display:none; flex:0 0 auto; padding:8px; text-align:center; animation:stroboskop 0.8s infinite; border-bottom:2px solid #000; }
        @keyframes stroboskop { 0% { background:#8b0000; color:#fff; } 50% { background:#ffeb3b; color:#000; } 100% { background:#8b0000; color:#fff; } }
        
        .main{ flex:1; display:grid; grid-template-columns: 300px 1fr 300px; overflow:hidden; padding:10px; gap:15px; }
        
        .map-container { background: var(--panel); border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #map-frame { width: 100%; height: 100%; border: none; display: none; }
        .map-placeholder { font-size: 1.2rem; color: #444; text-align: center; font-weight: bold; }

        .col{ display:flex; flex-direction:column; background:var(--panel); border-radius:4px; padding:10px; overflow:hidden; }
        .title{ text-align:center; font-size:1.5rem; font-weight:800; border-bottom:2px solid #222; padding-bottom:5px; margin-bottom:10px; }
        .list{ display:flex; flex-direction:column; gap:5px; overflow-y:auto; }
        .item{ padding:5px 10px; font-size:1.2rem; font-weight:bold; text-transform:uppercase; border-radius:3px; }
        .idem{ color:var(--green); background:rgba(0,230,118,0.1); }
        .nejdem{ color:var(--gray); background:rgba(255,255,255,0.05); }

        @media (max-width: 1024px){
            .main { grid-template-columns: 1fr 1fr; }
            .map-container { display: none; }
            .header{ flex-direction:column; padding:5px; }
        }
        @media (max-width: 600px){
            .main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">DHZ LEDNICA</div>
    <div id="timer" class="center-timer">--:--</div>
    <div style="display:flex; align-items:center; gap:15px;">
        <div id="clock" class="clock">00:00:00</div>
        <button class="reset" onclick="manualReset()">RESET</button>
    </div>
</div>

<div id="banner">
    <div id="typ" style="font-size:1.4rem; font-weight:900; text-transform:uppercase;"></div>
    <div id="adresa" style="font-weight:bold; font-size:1rem;"></div>
</div>

<div class="main">
    <div class="col">
        <div class="title" style="color:var(--green);">IDEM</div>
        <div id="idem" class="list"></div>
    </div>

    <div class="map-container">
        <div id="map-msg" class="map-placeholder">ČAKÁM NA ADRESU VÝJAZDU...</div>
        <iframe id="map-frame" src=""></iframe>
    </div>

    <div class="col">
        <div class="title" style="color:var(--gray);">NEJDEM</div>
        <div id="nejdem" class="list"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let timerInterval;

setInterval(() => { document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK"); }, 1000);

async function spracujVstup() {
    const params = new URLSearchParams(window.location.search);
    const u = params.get('udalost'); 
    const adr = params.get('miesto');
    const akc = params.get('akcia');
    const t = params.get('typ'); 

    const ref = db.collection("vyjazdy").doc("active");

    if (u) {
        await ref.set({ __metadata: { typ: u, miesto: adr || "", timestamp: Date.now() } }, { merge: true });
        sendPushover(u, adr, t);
        window.history.replaceState({}, '', window.location.pathname);
    }

    if (akc) {
        let meno = localStorage.getItem('h_meno') || prompt("Zadaj meno:");
        if (meno) {
            localStorage.setItem('h_meno', meno);
            await ref.set({ [meno]: akc }, { merge: true });
        }
        window.history.replaceState({}, '', window.location.pathname);
    }
}

function sendPushover(udalost, miesto, skupinaTyp) {
    const apiToken = "arrtgeqpd5uczfjk1x918fgziguqp9";
    const groupVyjazd = (skupinaTyp === "AED") ? "gzv839iw4b249tqay7jicqzaw53w42" : "g796q69yjbfy1v2e2kc5enwqn57j1x";
    
    const baseUrl = "https://hasici-lednica.web.app/index.html";
    const msg = `<b>UDALOSŤ:</b> ${udalost}\n<b>MIESTO:</b> ${miesto || "Nezadané"}\n\n<a href="${baseUrl}?akcia=IDEM">✅ IDEM</a>\n<a href="${baseUrl}?akcia=NEJDEM">❌ NEJDEM</a>`;
    const mapsUrl = miesto ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(miesto)}` : baseUrl;

    fetch("https://api.pushover.net/1/messages.json", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
            token: apiToken, user: groupVyjazd, message: msg,
            title: "🚨 DHZ LEDNICA", priority: 2, retry: 60, expire: 3600, sound: "siren", html: 1,
            url: mapsUrl, url_title: "📍 SPUSTIŤ NAVIGÁCIU"
        })
    });
}

db.collection("vyjazdy").doc("active").onSnapshot(doc => {
    const idemDiv = document.getElementById("idem");
    const nejdemDiv = document.getElementById("nejdem");
    const banner = document.getElementById("banner");
    const mapFrame = document.getElementById("map-frame");
    const mapMsg = document.getElementById("map-msg");
    
    idemDiv.innerHTML = ""; nejdemDiv.innerHTML = "";

    if (!doc.exists) {
        banner.style.display = "none";
        mapFrame.style.display = "none";
        mapMsg.style.display = "block";
        document.getElementById("timer").innerText = "--:--";
        if(timerInterval) clearInterval(timerInterval);
        return;
    }

    const d = doc.data();
    const m = d.__metadata || {};

    if (m.typ) {
        banner.style.display = "block";
        document.getElementById("typ").innerText = m.typ;
        document.getElementById("adresa").innerText = m.miesto || "";
        
        if (m.miesto && m.miesto.length > 2) {
            mapMsg.style.display = "none";
            mapFrame.style.display = "block";

            // ✅ UPRAVENÉ: štart Lednica 243 + trasa autom
            mapFrame.src = `https://www.google.com/maps?saddr=${encodeURIComponent("Lednica 243")}&daddr=${encodeURIComponent(m.miesto)}&dirflg=d&output=embed`;
        }
        startTimer(m.timestamp);
    }

    Object.keys(d).forEach(k => {
        if (k === "__metadata") return;
        const div = document.createElement("div");
        div.className = "item " + (d[k] === "IDEM" ? "idem" : "nejdem");
        div.innerText = k;
        (d[k] === "IDEM" ? idemDiv : nejdemDiv).appendChild(div);
    });
});

function startTimer(start) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const diff = 1800 - Math.floor((Date.now() - start) / 1000);
        if (diff <= 0) { clearInterval(timerInterval); return; }
        document.getElementById("timer").innerText = `${Math.floor(diff/60)}:${(diff%60).toString().padStart(2,"0")}`;
    }, 1000);
}

async function manualReset() {
    if (confirm("Resetovať výjazd?")) { await db.collection("vyjazdy").doc("active").delete(); }
}

window.onload = spracujVstup;
</script>
</body>
</html>
