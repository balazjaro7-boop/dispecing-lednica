<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DHZ Lednica - DISPEČING</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
:root{
    --bg:#07090c;
    --panel:#10141a;
    --green:#00e676;
    --gray:#888;
    --red:#ff1744;
    --yellow:#ffeb3b;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Segoe UI, sans-serif;
    background:var(--bg);
    color:#fff;
    overflow:hidden;
}

/* 1. RIADOK: HLAVIČKA */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#000;
    border-bottom:2px solid #222;
    flex:0 0 auto;
}
.brand{ font-size:1.3rem; font-weight:700; color:#aaa; line-height: 1.1; }
.center-timer{ font-size:1.8rem; font-family:monospace; color:var(--yellow); font-weight: bold; }
.right{ display:flex; align-items:center; gap:10px; }
.clock{ font-family:monospace; font-size:1.8rem; font-weight:bold; }
.reset{ background:#222; color:#aaa; border:1px solid #333; padding:5px 12px; cursor:pointer; font-size:0.8rem; }

/* 2. RIADOK: BANNER (ZMENŠENÝ) */
#banner {
    display: none; 
    flex: 0 0 auto;
    height: 65px;
    text-align: center;
    flex-direction: column;
    justify-content: center;
    animation: stroboskop 0.8s infinite;
    border-bottom: 2px solid #222;
}

@keyframes stroboskop {
    0% { background:#8b0000; color:#fff; }
    50% { background:#ffeb3b; color:#000; }
    100% { background:#8b0000; color:#fff; }
}

.event-info { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; line-height: 1; }
.event-time { font-size: 0.9rem; font-weight: bold; margin-top: 3px; }

/* HLAVNÁ ČASŤ */
.main{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    padding:10px;
    gap:15px;
    overflow:hidden;
}
.col{ display:flex; flex-direction:column; background:var(--panel); border-radius:4px; padding:10px; overflow:hidden; }
.title{ text-align:center; font-size:1.8rem; font-weight:800; margin-bottom:10px; border-bottom:2px solid #222; padding-bottom:5px; }

.list{ 
    display:grid; 
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); 
    gap:6px; 
    overflow-y:auto; 
}

.item{ 
    padding:6px 12px; 
    font-size:1.4rem; 
    font-weight:bold; 
    text-transform:uppercase; 
}
.idem{ color:var(--green); background:rgba(0,230,118,0.08); }
.nejdem{ color:var(--gray); background:rgba(255,255,255,0.03); }

/* MOBILE ÚPRAVA (O 50% MENŠIE) */
@media (max-width:768px){
    .header { padding: 5px 8px; }
    .brand { font-size: 0.75rem; width: 30%; }
    .center-timer { font-size: 1.2rem; }
    .clock { font-size: 1.1rem; }
    .reset { font-size: 0.6rem; padding: 3px 6px; }

    #banner { height: 50px; }
    .event-info { font-size: 0.85rem; }
    .event-time { font-size: 0.65rem; }

    .main { grid-template-columns: 1fr; gap: 8px; padding: 6px; }
    .title { font-size: 0.9rem; }

    .list { grid-template-columns: 1fr 1fr; gap: 3px; }
    .item { font-size: 0.65rem; padding: 4px; line-height: 1; }
}
</style>
</head>

<body>

<div class="header">
    <div class="brand">DHZ LEDNICA<br>DISPEČING</div>
    <div id="timer" class="center-timer">--:--</div>
    <div class="right">
        <div id="clock" class="clock">00:00:00</div>
        <button class="reset" onclick="manualReset()">RESET</button>
    </div>
</div>

<div id="banner">
    <div class="event-info">AKTUÁLNA UDALOSŤ</div>
    <div id="aktivacia-text" class="event-time"></div>
</div>

<div class="main">
    <div class="col">
        <div class="title" style="color:var(--green);">IDEM</div>
        <div id="idem" class="list"></div>
    </div>
    <div class="col">
        <div class="title" style="color:var(--gray);">NEJDEM</div>
        <div id="nejdem" class="list"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
    authDomain: "hasici-lednica.firebaseapp.com",
    projectId: "hasici-lednica"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let timerInterval;

setInterval(() => {
    document.getElementById("clock").innerText = new Date().toLocaleTimeString("sk-SK");
}, 1000);

// SPRACUJE SMS ODKAZ A AKTIVUJE BANNER
async function spracujVstup(){
    const params = new URLSearchParams(window.location.search);
    const meno = params.get('meno');
    const akcia = params.get('akcia');

    if (meno && akcia) {
        const ref = db.collection("vyjazdy").doc("active");
        const doc = await ref.get();

        if (!doc.exists) {
            const teraz = new Date();
            const formatCas = teraz.toLocaleTimeString("sk-SK");
            const formatDatum = teraz.toLocaleDateString("sk-SK");

            await ref.set({
                __metadata: {
                    aktivacia: `Čas aktivácie: ${formatCas} (${formatDatum})`,
                    timestamp: Date.now()
                },
                [meno]: akcia
            });
        } else {
            await ref.set({ [meno]: akcia }, { merge: true });
        }
        window.history.replaceState({}, '', '/');
    }
}

db.collection("vyjazdy").doc("active").onSnapshot(doc => {
    const idem = document.getElementById("idem");
    const nejdem = document.getElementById("nejdem");
    const banner = document.getElementById("banner");
    
    idem.innerHTML = ""; nejdem.innerHTML = "";

    if (!doc.exists) {
        banner.style.display = "none";
        document.getElementById("timer").innerText = "--:--";
        if(timerInterval) clearInterval(timerInterval);
        return;
    }

    const d = doc.data();
    const m = d.__metadata || {};

    if (m.timestamp) {
        banner.style.display = "flex";
        document.getElementById("aktivacia-text").innerText = m.aktivacia || "";
        startTimer(m.timestamp);
    }

    Object.keys(d).forEach(k => {
        if (k === "__metadata") return;
        const div = document.createElement("div");
        div.className = "item " + (d[k] === "IDEM" ? "idem" : "nejdem");
        div.innerText = k;
        (d[k] === "IDEM" ? idem : nejdem).appendChild(div);
    });
});

function startTimer(start) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const sekundy = 1800 - Math.floor((Date.now() - start) / 1000);
        if (sekundy <= 0) {
            document.getElementById("timer").innerText = "00:00";
            clearInterval(timerInterval);
            return;
        }
        const m = Math.floor(sekundy / 60);
        const s = sekundy % 60;
        document.getElementById("timer").innerText = `${m}:${s.toString().padStart(2, "0")}`;
    }, 1000);
}

async function manualReset() {
    if (confirm("Resetovať a vymazať zoznam?")) {
        await db.collection("vyjazdy").doc("active").delete();
    }
}

window.onload = spracujVstup;
</script>

</body>
</html>
