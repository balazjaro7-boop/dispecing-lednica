<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>DHZ Lednica - OPERAČNÉ</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; }

        body { 
            font-family: "Segoe UI", sans-serif;
            background: #0b0f14;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px 40px;
            border-bottom: 1px solid #222;
        }

        .title {
            font-size: 2em;
            font-weight: 700;
            color: #888;
        }

        .clock { 
            font-size: 3em; 
            font-family: monospace;
            color: #00e5ff;
        }

        /* EVENT */
        .event-banner { 
            text-align: center; 
            padding: 20px;
            font-size: 3em;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #8b0000, #ff0000);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* MAIN */
        .main-content { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px 40px;
            flex-grow: 1;
        }

        .block {
            background: #11161c;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .col-title { 
            font-size: 2em; 
            font-weight: 900;
            margin-bottom: 15px;
            text-align: center;
        }

        .idem-title { color: #00e676; }
        .nejdem-title { color: #666; }

        .names-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .name-entry { 
            font-size: 1.5em;
            font-weight: bold;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .color-idem { 
            background: rgba(0,230,118,0.15);
            color: #00e676;
        }

        .color-nejdem { 
            background: rgba(255,255,255,0.05);
            color: #777;
        }

        /* FOOTER */
        .bottom-bar {
            height: 40px;
            background: #0f141a;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-top: 1px solid #222;
        }

        .link-archiv {
            color: #555;
            text-decoration: none;
        }

        .btn-reset {
            position: absolute;
            left: 5px;
            top: 5px;
            opacity: 0.05;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>

<body>

<button class="btn-reset" onclick="manualReset()">.</button>

<div class="header">
    <div class="title">DHZ LEDNICA – OPERAČNÉ</div>
    <div id="clock" class="clock"></div>
</div>

<div id="banner" class="event-banner" style="display:none">
    <div id="u-display"></div>
</div>

<div class="main-content">
    <div class="block">
        <div class="col-title idem-title">IDEM</div>
        <div id="list-idem" class="names-grid"></div>
    </div>

    <div class="block">
        <div class="col-title nejdem-title">NEJDEM</div>
        <div id="list-nejdem" class="names-grid"></div>
    </div>
</div>

<div class="bottom-bar">
    <a href="archiv.html" class="link-archiv">📂 ARCHÍV VÝJAZDOV</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1rEXY06wS2Eq7YvNsDiqzlr_tX39ur-s",
        authDomain: "hasici-lednica.firebaseapp.com",
        projectId: "hasici-lednica",
        storageBucket: "hasici-lednica.firebasestorage.app",
        messagingSenderId: "747340639310",
        appId: "1:747340639310:web:e6cba7417ffae4ed59e71f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    /* HODINY */
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('sk-SK');
    }, 1000);

    /* PÔVODNÁ FUNKCIONALITA (NECHÁVAM) */
    const params = new URLSearchParams(window.location.search);
    const u = params.get('udalost');
    const a = params.get('akcia');

    if (u) {
        db.collection("vyjazdy").doc("active").set({ info: u, cas: Date.now() }, { merge: true });
        window.history.replaceState({}, '', '/');
    }

    if (a) {
        let m = localStorage.getItem('h_meno') || prompt("Meno:");
        if (m) { 
            m = m.trim().toUpperCase();
            localStorage.setItem('h_meno', m); 
            db.collection("vyjazdy").doc("active").set({ [m]: a }, { merge: true }); 
        }
        window.history.replaceState({}, '', '/');
    }

    /* REALTIME */
    db.collection("vyjazdy").doc("active").onSnapshot(doc => {

        const d_idem = document.getElementById('list-idem');
        const d_nejdem = document.getElementById('list-nejdem');
        const d_banner = document.getElementById('banner');

        d_idem.innerHTML = '';
        d_nejdem.innerHTML = '';

        if (!doc.exists) { 
            d_banner.style.display = 'none'; 
            return; 
        }

        const data = doc.data();

        if (data.info) {
            d_banner.style.display = 'block';
            document.getElementById('u-display').innerText = data.info;
        } else {
            d_banner.style.display = 'none';
        }

        Object.keys(data).sort().forEach(key => {
            if (key === 'info' || key === 'cas') return;

            const div = document.createElement('div');
            div.className = 'name-entry';
            div.innerText = key;

            if (data[key] === 'IDEM') {
                div.classList.add('color-idem');
                d_idem.appendChild(div);
            } 
            else if (data[key] === 'NEJDEM') {
                div.classList.add('color-nejdem');
                d_nejdem.appendChild(div);
            }
        });
    });

    /* RESET */
    async function manualReset() {
        if (!confirm("Uložiť výjazd do archívu a vymazať plochu?")) return;

        const ref = db.collection("vyjazdy").doc("active");
        const snap = await ref.get();

        if (snap.exists) {
            const d = snap.data();
            const idem = [], nejdem = [];

            Object.keys(d).forEach(k => {
                if (k !== 'info' && k !== 'cas') {
                    (d[k] === 'IDEM' ? idem : nejdem).push(k);
                }
            });

            await db.collection("archiv").add({ 
                datum: firebase.firestore.Timestamp.now(), 
                info: d.info || "Bez popisu", 
                idem, 
                nejdem 
            });

            await ref.delete();
        }
    }
</script>

</body>
</html>
